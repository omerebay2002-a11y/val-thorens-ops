<style>
  html, body { height: 100%; }

  .glass-strong {
    background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));

    -webkit-backdrop-filter: blur(22px) saturate(150%);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .display { font-family: 'Fraunces', serif; font-feature-settings: 'ss01','ss02'; letter-spacing: -0.01em; }

  /* ============ animations ============ */
  @keyframes float-in {
    from { opacity: 0; transform: translateY(14px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulse-warn {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.6); }
    50%      { box-shadow: 0 0 0 10px rgba(248,113,113,0); }
  }
  @keyframes ring-ok {
    0%   { box-shadow: 0 0 0 0 rgba(52,211,153,0.7); }
    100% { box-shadow: 0 0 0 14px rgba(52,211,153,0); }
  }
  @keyframes drawer-open {
    from { transform: translateY(-12px); opacity: 0; max-height: 0; }
    to   { transform: translateY(0);     opacity: 1; max-height: 1200px; }
  }
  @keyframes ember {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.06); }
  }
  .anim-float-in { animation: float-in 0.55s cubic-bezier(0.2,0.8,0.2,1) both; }

  .anim-fade-in  { animation: fade-in 0.4s ease both; }

  .anim-drawer   { animation: drawer-open 0.45s cubic-bezier(0.2,0.8,0.2,1) both; }
  .anim-ember    { animation: ember 2.4s ease-in-out infinite; }

  /* stagger helpers */
  .stagger > * { animation: float-in 0.5s cubic-bezier(0.2,0.8,0.2,1) both; }
  .stagger > *:nth-child(1)  { animation-delay: 0.02s; }
  .stagger > *:nth-child(2)  { animation-delay: 0.06s; }
  .stagger > *:nth-child(3)  { animation-delay: 0.10s; }
  .stagger > *:nth-child(4)  { animation-delay: 0.14s; }
  .stagger > *:nth-child(5)  { animation-delay: 0.18s; }
  .stagger > *:nth-child(6)  { animation-delay: 0.22s; }
  .stagger > *:nth-child(7)  { animation-delay: 0.26s; }
  .stagger > *:nth-child(8)  { animation-delay: 0.30s; }
  .stagger > *:nth-child(9)  { animation-delay: 0.34s; }
  .stagger > *:nth-child(10) { animation-delay: 0.38s; }
  .stagger > *:nth-child(n+11) { animation-delay: 0.42s; }

  .tilt { transition: transform 0.3s cubic-bezier(0.2,0.8,0.2,1); transform-style: preserve-3d; }
  .tilt:hover { transform: perspective(800px) rotateX(2deg) rotateY(-2deg) translateY(-2px); }

  /* room tile glow */
  .room-tile {
    position: relative;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    transform-style: preserve-3d;
  }
  .room-tile:hover { transform: translateY(-3px) scale(1.01); }
  .room-tile::after {
    content: ''; position: absolute; inset: -2px; border-radius: inherit; pointer-events: none;

  }

  .item-card {
    position: relative;
    transition: transform 0.18s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .item-card:active { transform: scale(0.97); }

  .counter-grain {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 6px);

  .ring-glow {

const getItemRequired = (item, capacity, category, targets) => {
  const override = targets && targets[targetKey(category, item.key)];
  if (override && override.perPerson) {
    return { required: capacity * override.perPerson, isCountable: true };
  }
  if (KITCHEN_KEYS.has(item.key)) return { required: 1, isCountable: false };
  if (item.perPerson) return { required: capacity * item.perPerson, isCountable: true };
  if (item.count && item.count > 1) return { required: item.count, isCountable: true };
  return { required: 1, isCountable: false };
};

const safeLoad = (key, fallback) => {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    console.warn('Storage read failed:', key, e);
    return fallback;
  }
};

const safeSave = (key, val) => {
  try {
    localStorage.setItem(key, JSON.stringify(val));
  } catch (e) {
    // localStorage full — that's OK, data is in the cloud (JSONBin) anyway.
    // Try clearing the cache for this key so next save can succeed.
    console.warn('Storage write failed (data still safe in cloud):', key, e);
    try { localStorage.removeItem(key); } catch {}
  }
};

/* dataURL → Blob conversion for migrating legacy base64 photos */
const dataUrlToBlob = (dataUrl) => {
  const [head, body] = dataUrl.split(',');
  const mime = head.match(/data:([^;]+)/)?.[1] || 'image/jpeg';
  const bin  = atob(body);
  const arr  = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
};

/* Walks an inspection map, uploads any base64 photo srcs to Cloudinary,
   replaces them with URLs. Returns a new inspections object if changes were
   made, or null otherwise. */
const migrateBase64Photos = async (inspections) => {
  let changed = false;
  const out = JSON.parse(JSON.stringify(inspections || {}));
  for (const aptId in out) {
    const photos = out[aptId]?.maintenance?.photos;
    if (!Array.isArray(photos)) continue;
    for (let i = 0; i < photos.length; i++) {
      const src = photos[i]?.src;
      if (typeof src === 'string' && src.startsWith('data:image')) {
        try {
          const url = await uploadToCloudinary(dataUrlToBlob(src));
          photos[i] = { ...photos[i], src: url };
          changed = true;
        } catch (e) { console.warn('Photo migration failed for', aptId, i, e); }
      }
    }
  }
  return changed ? out : null;
};

const blankStatus = () => ({ status: 'pending', note: '', presentCount: null, missingCount: null });

const createBlankInspection = () => {
  const fillStatus = (items) => Object.fromEntries(items.map(i => [i.key, blankStatus()]));
  const fillBool   = (items) => Object.fromEntries(items.map(i => [i.key, false]));
  return {
    kitchen: { ...fillStatus(KITCHEN_MULTIPLIERS), ...fillStatus(KITCHEN_FIXED) },
    dining:   fillStatus(DINING_ITEMS),
    bathroom: fillStatus(BATHROOM_ITEMS),
    general:  fillStatus(GENERAL_ITEMS),
    maintenance: { renovations: '', photos: [] },
    exit: fillBool(EXIT_CHECKLIST),
    completed: false,
    completedAt: null,
    updatedAt: null,
  };
};

const inspectionProgress = (insp) => {
  if (!insp) return 0;
  const groups = ['kitchen','dining','bathroom','general'];
  let total = 0, done = 0;
  groups.forEach(g => {
    Object.values(insp[g] || {}).forEach(v => {
      total += 1;
      if (v.status && v.status !== 'pending') done += 1;
    });
  });
  const exitTotal = EXIT_CHECKLIST.length;
  const exitDone  = EXIT_CHECKLIST.filter(i => insp.exit?.[i.key]).length;
  total += exitTotal; done += exitDone;
  return total === 0 ? 0 : Math.round((done / total) * 100);
};

const inspectionHasIssues = (insp) => {
  if (!insp) return false;
  const groups = ['kitchen','dining','bathroom','general'];
  return groups.some(g =>
    Object.values(insp[g] || {}).some(v => v.status === 'partial' || v.status === 'missing')
  );
};

const computeShortage = (value, requiredCount, isMultiplier) => {
  if (!value || value.status === 'pending') return 0;
  // Explicit missingCount always wins — user entered it directly
  if (Number.isFinite(value.missingCount) && value.missingCount >= 0) return value.missingCount;
  if (value.status === 'ok') return 0;
  if (isMultiplier && requiredCount) {
    if (value.status === 'missing') return requiredCount;
    if (value.status === 'partial') {
      const present = Number(value.presentCount);
      const safe = Number.isFinite(present) && present >= 0 ? present : 0;
      return Math.max(0, requiredCount - safe);
    }
  }
  return value.status === 'missing' || value.status === 'partial' ? 1 : 0;
};

const CATEGORY_META = {
  kitchen:  { label: 'מטבח',     accent: 'orange'  },
  dining:   { label: 'אוכל/סלון', accent: 'sky'     },
  bathroom: { label: 'אמבטיה',   accent: 'purple'  },
  general:  { label: 'כללי',     accent: 'emerald' },
};

const computePropertyShortages = (property, inspection, targets) => {
  if (!inspection) return [];
  const out = [];
  const cap = property.capacity;
  const sources = [
    { category: 'kitchen',  items: KITCHEN_MULTIPLIERS },
    { category: 'kitchen',  items: KITCHEN_FIXED },
    { category: 'dining',   items: DINING_ITEMS },
    { category: 'bathroom', items: BATHROOM_ITEMS },
    { category: 'general',  items: GENERAL_ITEMS },
  ];
  sources.forEach(({ category, items }) => {
    items.forEach(item => {
      const v = inspection[category]?.[item.key];
      const hasTarget = targets && targets[targetKey(category, item.key)];
      // Skip nothing when a target override exists — it computes shortage from presentCount alone.
      if (!hasTarget && (!v || v.status === 'ok' || v.status === 'pending')) return;

      const { required, isCountable } = getItemRequired(item, cap, category, targets);

      let qty;
      if (hasTarget && isCountable) {
        const present = Number(v?.presentCount);
        const safe = Number.isFinite(present) && present >= 0 ? present : 0;
        qty = Math.max(0, required - safe);
        if (qty <= 0) return;
      } else {
        qty = computeShortage(v, required, isCountable);
      }

      out.push({
        category, key: item.key, label: item.label,
        status: v?.status || 'pending', note: v?.note || '',
        required, presentCount: v?.presentCount, qty, isMultiplier: isCountable,
      });
    });
  });
  return out;
};

const computeAggregateShortages = (properties, inspections, targets) => {
  const map = {};
  properties.forEach(p => {
    const list = computePropertyShortages(p, inspections[p.id], targets);
    list.forEach(entry => {
      const id = `${entry.category}:${entry.key}`;
      if (!map[id]) {
        map[id] = { itemKey: entry.key, label: entry.label, category: entry.category, totalQty: 0, breakdown: [] };
      }
      map[id].totalQty += entry.qty;
      map[id].breakdown.push({
        propertyId: p.id, propertyName: p.name,
        qty: entry.qty, status: entry.status, note: entry.note,
      });
    });
  });
  return Object.values(map).sort((a, b) => {
    if (a.category !== b.category) return a.category.localeCompare(b.category);
    return b.totalQty - a.totalQty;
  });
};

/* ── Cloudinary upload (unsigned preset, browser-side) ── */
const CLOUDINARY = { cloudName: 'dfejigl2j', preset: 'ml_default' };

const compressFile = (file, maxDim = 1280, quality = 0.75) =>
  new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; }
        else if (height > maxDim)              { width  = Math.round(width  * (maxDim / height)); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        canvas.toBlob(b => b ? resolve(b) : reject(new Error('blob fail')), 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

const uploadToCloudinary = async (blob) => {
  const fd = new FormData();
  fd.append('file', blob);
  fd.append('upload_preset', CLOUDINARY.preset);
  const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/image/upload`, { method: 'POST', body: fd });
  if (!r.ok) throw new Error('cloudinary ' + r.status);
  const j = await r.json();
  return j.secure_url;
};

// Main entry: compress + upload, returns the public URL
const compressImage = async (file) => {
  const blob = await compressFile(file);
  return await uploadToCloudinary(blob);
};

const cycleStatus = (s) => s === 'pending' ? 'ok' : s === 'ok' ? 'partial' : s === 'partial' ? 'missing' : 'pending';

const roomCategoryProgress = (insp, key) => {
  if (!insp) return { pct: 0, total: 0, done: 0, issues: 0 };
  if (key === 'kitchen') {
    const all = [...KITCHEN_MULTIPLIERS, ...KITCHEN_FIXED];
    const total = all.length;
    let done = 0, issues = 0;
    all.forEach(it => {
      const v = insp.kitchen?.[it.key];
      if (v?.status && v.status !== 'pending') done += 1;
      if (v?.status === 'partial' || v?.status === 'missing') issues += 1;
    });
    return { pct: total ? Math.round(done/total*100) : 0, total, done, issues };
  }
  if (key === 'dining' || key === 'bathroom' || key === 'general') {
    const items = key === 'dining' ? DINING_ITEMS : key === 'bathroom' ? BATHROOM_ITEMS : GENERAL_ITEMS;
    let done = 0, issues = 0;
    items.forEach(it => {
      const v = insp[key]?.[it.key];
      if (v?.status && v.status !== 'pending') done += 1;
      if (v?.status === 'partial' || v?.status === 'missing') issues += 1;
    });
    return { pct: items.length ? Math.round(done/items.length*100) : 0, total: items.length, done, issues };
  }
  if (key === 'maintenance') {
    const has = (insp.maintenance?.renovations?.trim()?.length || 0) > 0 || insp.maintenance?.photos?.length > 0;
    return { pct: has ? 100 : 0, total: 1, done: has ? 1 : 0, issues: 0 };
  }
  if (key === 'exit') {
    const total = EXIT_CHECKLIST.length;
    const done = EXIT_CHECKLIST.filter(i => insp.exit?.[i.key]).length;
    return { pct: total ? Math.round(done/total*100) : 0, total, done, issues: 0 };
  }
  return { pct: 0, total: 0, done: 0, issues: 0 };
};

   5. PROGRESS RING
   ========================================================= */

const ProgressRing = ({ pct, size = 64, stroke = 6, color = '#34d399', track = 'rgba(255,255,255,0.08)', label }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return (
    <div className="relative" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={r} stroke={track} strokeWidth={stroke} fill="none" />
        <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
                strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset}
                style={{ transition: 'stroke-dashoffset 0.6s cubic-bezier(0.2,0.8,0.2,1)' }}
                className="ring-glow" />
      </svg>
      <div className="absolute inset-0 flex items-center justify-center text-xs font-bold text-ice-100">
        {label ?? `${pct}%`}
      </div>
    </div>
  );
};

            placeholder="הערה (אופציונלי)"
            value={value.note || ''}
            onChange={e => onChange({ ...value, note: e.target.value })}
            className="mt-3 w-full px-3 py-2 rounded-xl bg-white/[0.04] border border-white/10 text-ice-100 text-sm placeholder-ice-100/30 focus:outline-none focus:ring-2 focus:ring-copper-500 resize-none"
          />

          {status !== 'pending' && (
            <button type="button" onClick={clearStatus}
              className="mt-2 w-full py-2.5 rounded-xl bg-white/[0.04] border border-white/10 text-ice-100/70 text-sm hover:bg-white/[0.08] transition">
              נקה סימון
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

                <span className="text-[9px] font-bold text-emerald-300 bg-emerald-500/15 px-1 rounded">יש {v.presentCount}</span>

            <span className="text-[8px] text-amber-300/80 leading-tight text-center px-0.5 truncate w-full">📝 {v.note}</span>

/* =========================================================
   ROOM HOOK  — selection state + sheet wiring
   ========================================================= */

const useRoomSheet = ({ inspection, categoryKey, items, capacity, onChange }) => {
  const [selectedKey, setSelectedKey] = useState(null);
  const update = (key, value) => onChange({ ...inspection, [categoryKey]: { ...inspection[categoryKey], [key]: value }, updatedAt: Date.now() });
  const markAllOk = () => {
    if (!confirm('לסמן את כל הפריטים בחדר זה כ"תקין"?')) return;
    const next = { ...inspection[categoryKey] };
    items.forEach(it => { next[it.key] = { ...(next[it.key] || blankStatus()), status: 'ok' }; });
    onChange({ ...inspection, [categoryKey]: next, updatedAt: Date.now() });
  };
  const selectedItem  = selectedKey ? items.find(i => i.key === selectedKey) : null;
  const selectedValue = selectedKey ? (inspection[categoryKey][selectedKey] || blankStatus()) : null;
  const reqInfo = selectedItem ? getItemRequired(selectedItem, capacity) : null;
  const sheet = (
    <StatusSheet
      open={!!selectedKey}
      item={selectedItem}
      requiredCount={reqInfo?.required}
      isMultiplier={reqInfo?.isCountable}
      value={selectedValue}
      onChange={(v) => update(selectedKey, v)}
      onClose={() => setSelectedKey(null)}
    />
  );
  return { selectedKey, setSelectedKey, sheet, update, markAllOk };
};

/* ---------- Isometric Kitchen Scene ---------- */

const IsoKitchenScene = ({ inspection, onTap }) => {
  const T  = 22;          // tile size px
  const OX = 280;         // origin x
  const OY = 70;          // origin y
  const px = (x, y) => OX + (x - y) * 0.866 * T;
  const py = (x, y, z = 0) => OY + (x + y) * 0.5 * T - z * T;
  const pt = (x, y, z = 0) => `${px(x, y).toFixed(1)},${py(x, y, z).toFixed(1)}`;

  const polyTop   = (x, y, w, d, z)       => `${pt(x,y,z)} ${pt(x+w,y,z)} ${pt(x+w,y+d,z)} ${pt(x,y+d,z)}`;
  const polyFront = (x, y, w, d, z0, z1)  => `${pt(x,y+d,z1)} ${pt(x+w,y+d,z1)} ${pt(x+w,y+d,z0)} ${pt(x,y+d,z0)}`;
  const polyRight = (x, y, w, d, z0, z1)  => `${pt(x+w,y,z1)} ${pt(x+w,y+d,z1)} ${pt(x+w,y+d,z0)} ${pt(x+w,y,z0)}`;

  const STATUS_GLOW = { ok: '#34d399', partial: '#fbbf24', missing: '#fb7185', pending: null };
  const get = (key) => inspection.kitchen[key] || blankStatus();

  const App = ({ keyName, x, y, w, d, h, baseZ = 0, faceColor, topColor, sideColor, accent, emoji, badge }) => {
    const v = get(keyName);
    const glow = STATUS_GLOW[v.status] || null;
    const z0 = baseZ;
    const z1 = baseZ + h;
    const cx = px(x + w/2, y + d/2);
    const cyTop = py(x + w/2, y + d/2, z1);
    return (
      <g onClick={() => onTap(keyName)} style={{ cursor: 'pointer' }} className="iso-app">
        {glow && (
          <ellipse cx={cx} cy={py(x+w/2, y+d/2, z0)} rx={Math.max(w, d)*T*0.55} ry={Math.max(w, d)*T*0.27}
            fill={glow} opacity="0.55" style={{ filter: 'blur(8px)' }} />
        )}
        <polygon points={polyRight(x, y, w, d, z0, z1)} fill={sideColor || faceColor} stroke="rgba(0,0,0,0.45)" strokeWidth="0.7" />
        <polygon points={polyFront(x, y, w, d, z0, z1)} fill={faceColor}              stroke="rgba(0,0,0,0.45)" strokeWidth="0.7" />
        <polygon points={polyTop(x, y, w, d, z1)}       fill={topColor  || faceColor} stroke="rgba(0,0,0,0.35)" strokeWidth="0.7" />
        {accent}
        {emoji && (
          <text x={cx} y={cyTop + 4} textAnchor="middle" fontSize="13"
            style={{ userSelect: 'none', pointerEvents: 'none' }}>{emoji}</text>
        )}
        {badge != null && (
          <g style={{ pointerEvents: 'none' }}>
            <rect x={cx - 9} y={cyTop - 18} width="18" height="11" rx="3"
              fill="rgba(10,22,40,0.85)" stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
            <text x={cx} y={cyTop - 9.5} textAnchor="middle" fontSize="8" fill="#e6eef7" fontWeight="700">{badge}</text>
          </g>
        )}
        <circle cx={cx + 14} cy={cyTop - 14} r="4"
          fill={glow || 'rgba(255,255,255,0.15)'}
          stroke="rgba(10,22,40,0.9)" strokeWidth="1.4"
          style={{ pointerEvents: 'none', filter: glow ? `drop-shadow(0 0 5px ${glow})` : 'none' }}/>

    );
  };

  // Room dims
  const RW = 12, RD = 8, WH = 4.6;

  return (

/* =========================================================
   8. ISO SCENE HELPERS  — shared projection
   ========================================================= */

const useIsoHelpers = (T, OX, OY) => {
  const px = (x, y) => OX + (x - y) * 0.866 * T;
  const py = (x, y, z = 0) => OY + (x + y) * 0.5 * T - z * T;
  const pt = (x, y, z = 0) => `${px(x, y).toFixed(1)},${py(x, y, z).toFixed(1)}`;
  const polyTop   = (x, y, w, d, z)       => `${pt(x,y,z)} ${pt(x+w,y,z)} ${pt(x+w,y+d,z)} ${pt(x,y+d,z)}`;
  const polyFront = (x, y, w, d, z0, z1)  => `${pt(x,y+d,z1)} ${pt(x+w,y+d,z1)} ${pt(x+w,y+d,z0)} ${pt(x,y+d,z0)}`;
  const polyRight = (x, y, w, d, z0, z1)  => `${pt(x+w,y,z1)} ${pt(x+w,y+d,z1)} ${pt(x+w,y+d,z0)} ${pt(x+w,y,z0)}`;
  return { px, py, pt, polyTop, polyFront, polyRight };
};

const STATUS_GLOW_HEX = { ok: '#34d399', partial: '#fbbf24', missing: '#fb7185', pending: null };

const makeAppRenderer = (helpers, inspection, categoryKey, onTap) => ({ keyName, x, y, w, d, h, baseZ = 0, faceColor, topColor, sideColor, accent, emoji }) => {
  const { px, py, polyTop, polyFront, polyRight } = helpers;
  const v = inspection[categoryKey][keyName] || blankStatus();
  const glow = STATUS_GLOW_HEX[v.status] || null;
  const z0 = baseZ;
  const z1 = baseZ + h;
  const cx = px(x + w/2, y + d/2);
  const cyTop = py(x + w/2, y + d/2, z1);
  const T = (helpers.px(1,0) - helpers.px(0,0)) / 0.866;
  return (
    <g key={keyName} onClick={() => onTap(keyName)} style={{ cursor: 'pointer' }}>
      {glow && (
        <ellipse cx={cx} cy={py(x+w/2, y+d/2, z0)} rx={Math.max(w, d)*T*0.55} ry={Math.max(w, d)*T*0.27}
          fill={glow} opacity="0.55" style={{ filter: 'blur(8px)' }} />
      )}
      <polygon points={polyRight(x, y, w, d, z0, z1)} fill={sideColor || faceColor} stroke="rgba(0,0,0,0.45)" strokeWidth="0.7" />
      <polygon points={polyFront(x, y, w, d, z0, z1)} fill={faceColor}              stroke="rgba(0,0,0,0.45)" strokeWidth="0.7" />
      <polygon points={polyTop(x, y, w, d, z1)}       fill={topColor  || faceColor} stroke="rgba(0,0,0,0.35)" strokeWidth="0.7" />
      {accent}
      {emoji && (
        <text x={cx} y={cyTop + 4} textAnchor="middle" fontSize="13"
          style={{ userSelect: 'none', pointerEvents: 'none' }}>{emoji}</text>
      )}
      <circle cx={cx + 14} cy={cyTop - 14} r="4"
        fill={glow || 'rgba(255,255,255,0.15)'} stroke="rgba(10,22,40,0.9)" strokeWidth="1.4"
        style={{ pointerEvents: 'none', filter: glow ? `drop-shadow(0 0 5px ${glow})` : 'none' }}/>
    </g>
  );
};

const RoomFullList = ({ accent, items, inspectionRoom, capacity, onSelect, onMarkAllOk }) => {
  const tone = ROOM_ACCENT[accent];
  const total = items.length;
  let done = 0, issues = 0;
  items.forEach(it => {
    const s = inspectionRoom[it.key]?.status;
    if (s && s !== 'pending') done += 1;
    if (s === 'partial' || s === 'missing') issues += 1;
  });
  return (
    <div className={`rounded-2xl glass border ${tone.ring} p-3`}>
      <div className="flex items-center justify-between mb-2">
        <div className={`text-[10px] uppercase tracking-[0.18em] ${tone.text}/70 display`}>רשימה מלאה</div>
        <div className="text-[10px] text-ice-100/50">
          {done}/{total} נבדקו{issues > 0 ? ` · ${issues} ליקויים` : ''}
        </div>
      </div>
      {onMarkAllOk && (
        <button type="button" onClick={onMarkAllOk}
          className="w-full mb-3 py-2 px-3 rounded-xl bg-emerald-500/15 border border-emerald-400/40 text-emerald-200 font-bold text-sm hover:bg-emerald-500/25 active:scale-[0.98] transition flex items-center justify-center gap-1.5">

  );
};

/* =========================================================
   9. MAINTENANCE PANEL
   ========================================================= */

const normalizePhotos = (photos) => (photos || [])
  .map(p => typeof p === 'string' ? { src: p, note: '' } : (p && typeof p === 'object' ? { src: p.src || '', note: p.note || '' } : null))
  .filter(Boolean);

const MaintenancePanel = ({ inspection, onChange }) => {
  const fileInputRef = useRef(null);
  const update = (m) => onChange({ ...inspection, maintenance: m, updatedAt: Date.now() });
  const photos = normalizePhotos(inspection.maintenance.photos);

  const handleFiles = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    try {
      const newPhotos = await Promise.all(files.map(async f => ({ src: await compressImage(f), note: '' })));
      update({ ...inspection.maintenance, photos: [...photos, ...newPhotos] });
    } catch (err) { console.error(err); alert('טעינת התמונה נכשלה.'); }
    finally { e.target.value = ''; }
  };

  const removePhoto = (idx) => update({ ...inspection.maintenance, photos: photos.filter((_, i) => i !== idx) });
  const setPhotoNote = (idx, note) => update({ ...inspection.maintenance, photos: photos.map((p, i) => i === idx ? { ...p, note } : p) });

  return (
    <div className="space-y-3">
      <div className="rounded-2xl glass-strong border border-rose-400/30 p-4">
        <div className="flex items-center gap-3 mb-3">
          <div className="w-12 h-12 rounded-xl bg-rose-500/15 flex items-center justify-center text-2xl">🔧</div>
          <div>
            <div className="display text-2xl text-ice-50 leading-tight">תחזוקה ושיפוצים</div>
            <div className="text-xs text-ice-100/50">תיעוד נזקים, תיקונים נדרשים, צילומים</div>
          </div>
        </div>

        <textarea
          value={inspection.maintenance.renovations}
          onChange={e => update({ ...inspection.maintenance, renovations: e.target.value })}
          placeholder="פרט שיפוצים נדרשים, תיקונים, צביעה, פגיעות בקירות וכו'…"
          rows={5}
          className="w-full px-3 py-2 rounded-xl bg-night-900/60 border border-white/10 text-ice-100 placeholder-ice-100/30 focus:outline-none focus:ring-2 focus:ring-rose-400 text-sm" />

        <div className="mt-3">
          <input ref={fileInputRef} type="file" accept="image/*" capture="environment" multiple
            onChange={handleFiles} className="hidden" />
          <button type="button" onClick={() => fileInputRef.current?.click()}
            className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl border-2 border-dashed border-rose-400/40 text-rose-200 font-semibold hover:border-rose-400 hover:bg-rose-500/10 transition">
            <IconCamera size={18}/> הוסף תמונות נזק / שיפוץ
          </button>

          {photos.length > 0 && (
            <div className="grid grid-cols-2 gap-3 mt-3 stagger">
              {photos.map((photo, idx) => (
                <div key={idx} className="rounded-xl overflow-hidden border border-white/10 bg-night-950/40">
                  <div className="relative">
                    <img src={photo.src} alt={`damage-${idx}`} className="w-full h-32 object-cover" />
                    <button type="button" onClick={() => removePhoto(idx)}
                      className="absolute top-1 left-1 bg-rose-600 text-white rounded-full p-1.5 shadow-md hover:bg-rose-700"
                      aria-label="מחק תמונה">
                      <IconX size={12}/>
                    </button>
                    <div className="absolute bottom-1 right-1 px-1.5 py-0.5 rounded bg-night-950/80 text-[10px] text-ice-100/70 font-bold">#{idx+1}</div>
                  </div>
                  <input type="text" value={photo.note}
                    onChange={e => setPhotoNote(idx, e.target.value)}
                    placeholder="הערה לתמונה…"
                    className="w-full px-2 py-2 text-xs bg-transparent text-ice-100 placeholder-ice-100/30 focus:outline-none border-t border-white/5 focus:bg-white/[0.03]" />
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* =========================================================
   10. EXIT CHECKPOINT
   ========================================================= */

const ExitCheckpoint = ({ inspection, onChange }) => {
  const update = (k, v) => onChange({ ...inspection, exit: { ...inspection.exit, [k]: v }, updatedAt: Date.now() });
  const allChecked = EXIT_CHECKLIST.every(i => inspection.exit[i.key]);

  const completeInspection = () => {
    if (!allChecked) return;
    onChange({ ...inspection, completed: true, completedAt: Date.now(), updatedAt: Date.now() });
  };
  const reopenInspection = () => onChange({ ...inspection, completed: false, completedAt: null, updatedAt: Date.now() });

  return (
    <div className="rounded-2xl glass-strong border border-amber-400/30 p-4 space-y-3">
      <div className="flex items-center gap-3">
        <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-2xl transition ${allChecked ? 'bg-emerald-500/20 anim-ember' : 'bg-amber-500/15'}`}>
          {allChecked ? '🔓' : '🔐'}
        </div>
        <div>
          <div className="display text-2xl text-ice-50 leading-tight">פרוטוקול יציאה</div>
          <div className="text-xs text-ice-100/50">חובה לאשר את כל 6 הסעיפים</div>
        </div>
      </div>

      <div className="space-y-2 stagger">
        {EXIT_CHECKLIST.map((item, idx) => {
          const checked = inspection.exit[item.key];
          return (
            <button key={item.key} type="button" onClick={() => update(item.key, !checked)}
              className={`w-full flex items-center gap-3 p-3 rounded-xl border-2 text-right transition active:scale-[0.99] ${
                checked ? 'bg-emerald-500/15 border-emerald-400/60 text-emerald-100' : 'bg-night-900/40 border-white/10 text-ice-100 hover:border-white/20'
              }`}>
              <span className={`shrink-0 w-7 h-7 rounded-md border-2 flex items-center justify-center transition ${checked ? 'bg-emerald-500 border-emerald-500' : 'bg-night-900 border-white/20'}`}>
                {checked && <IconCheck size={16}/>}
              </span>
              <span className="font-semibold flex-1">{idx + 1}. {item.label}</span>
            </button>
          );
        })}
      </div>

      {!inspection.completed ? (
        <button type="button" disabled={!allChecked} onClick={completeInspection}
          className={`w-full py-4 rounded-xl font-extrabold text-base transition flex items-center justify-center gap-2 ${
            allChecked
              ? 'bg-gradient-to-l from-emerald-500 to-emerald-400 text-white shadow-[0_8px_30px_-10px_rgba(52,211,153,0.7)] active:scale-[0.99]'
              : 'bg-white/[0.05] text-ice-100/40 cursor-not-allowed border border-white/10'
          }`}>
          {allChecked ? <IconCheck size={20}/> : <IconLock size={20}/>}
          {allChecked ? 'סיים בדיקה ונעל' : 'נעול – יש לאשר את כל הסעיפים'}
        </button>
      ) : (
        <div className="space-y-2">
          <div className="flex items-center justify-center gap-2 py-3 rounded-xl bg-emerald-500/15 border border-emerald-400/40 text-emerald-200 font-bold">
            <IconCheck size={18}/> הבדיקה הושלמה {inspection.completedAt ? `– ${new Date(inspection.completedAt).toLocaleString('he-IL')}` : ''}
          </div>
          <button type="button" onClick={reopenInspection}
            className="w-full py-2 rounded-xl bg-white/[0.05] hover:bg-white/[0.08] border border-white/15 text-ice-100 font-semibold flex items-center justify-center gap-2">
            <IconRefresh size={16}/> פתח מחדש לעריכה
          </button>
        </div>
      )}
    </div>
  );
};

const RoomScreen = ({ property, inspection, roomKey, onChange }) => {
  const cap = property.capacity;
  if (roomKey === 'kitchen')     return <KitchenDiagram  inspection={inspection} capacity={cap} onChange={onChange} />;
  if (roomKey === 'dining')      return <LivingDiagram   inspection={inspection} capacity={cap} onChange={onChange} />;
  if (roomKey === 'bathroom')    return <BathroomDiagram inspection={inspection} capacity={cap} onChange={onChange} />;
  if (roomKey === 'general')     return <BedroomDiagram  inspection={inspection} capacity={cap} doubleBeds={property.doubleBeds} onChange={onChange} />;
  if (roomKey === 'maintenance') return <MaintenancePanel inspection={inspection} onChange={onChange} />;
  if (roomKey === 'exit')        return <ExitCheckpoint   inspection={inspection} onChange={onChange} />;
  return null;
};

const VantaHero = () => {
  const ref = useRef(null);
  const effectRef = useRef(null);
  useEffect(() => {
    if (!window.VANTA || !ref.current) return;
    effectRef.current = window.VANTA.FOG({
      el: ref.current, THREE: window.THREE,
      mouseControls: false, touchControls: false, gyroControls: false,
      highlightColor: 0xc87f3e, midtoneColor: 0x2a4f8a, lowlightColor: 0x0a1628, baseColor: 0x05080f,
      blurFactor: 0.65, speed: 1.0, zoom: 0.85,
    });
    return () => { effectRef.current?.destroy(); };
  }, []);
  return <div ref={ref} className="absolute inset-0"/>;
};

const AptCard = ({ property, inspection, onClick, index }) => {
  const progress = inspectionProgress(inspection);
  const issues = inspectionHasIssues(inspection);
  const completed = inspection?.completed;
  const tone = completed ? 'emerald' : issues ? 'amber' : progress > 0 ? 'sky' : 'slate';
  const ring = completed ? 'border-emerald-400/40' : issues ? 'border-amber-400/40' : progress > 0 ? 'border-sky-400/30' : 'border-white/10';
  const ringColor = completed ? '#34d399' : issues ? '#fbbf24' : progress > 0 ? '#5a8edb' : '#94a3b8';

  return (
    <button type="button" onClick={onClick}
      className={`group relative tilt rounded-2xl glass border ${ring} p-3 text-right overflow-hidden`}
      style={{ animationDelay: `${Math.min(index*30, 600)}ms` }}>
      <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition" style={{ background: 'radial-gradient(circle at 30% 20%, rgba(255,255,255,0.06), transparent 60%)' }}/>
      <div className="relative flex items-center gap-3">
        <ProgressRing pct={progress} size={48} stroke={4} color={ringColor} />
        <div className="flex-1 min-w-0">
          <div className="display text-base text-ice-50 truncate leading-tight">{property.name}</div>
          <div className="text-[11px] text-ice-100/50 flex items-center gap-2 mt-0.5">
            <span>תפוסה {property.capacity}</span>
            {property.doubleBeds > 0 && <><span>·</span><span>{property.doubleBeds} זוגיות</span></>}
          </div>
          {property.code && (
            <div className="mt-1 flex items-center gap-1.5">
              <span className="font-mono font-bold text-[12px] tracking-widest text-copper-300 bg-copper-500/10 border border-copper-500/30 px-1.5 py-0.5 rounded-md">{property.code}</span>
              {property.codeNote && <span className="text-[10px] text-ice-100/40">{property.codeNote}</span>}
            </div>
          )}
        </div>
      </div>
      <div className="relative mt-2 flex items-center justify-between">
        {completed ? (
          <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] bg-emerald-500/15 text-emerald-200 border border-emerald-400/30 font-bold">
            <IconCheck size={10}/> הושלמה
          </span>
        ) : issues ? (
          <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] bg-amber-500/15 text-amber-200 border border-amber-400/30 font-bold">
            <IconAlert size={10}/> ליקויים
          </span>
        ) : progress > 0 ? (
          <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] bg-sky-400/15 text-sky-200 border border-sky-400/30 font-bold">
            בטיפול
          </span>
        ) : (
          <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] bg-white/[0.04] text-ice-100/50 border border-white/10 font-bold">
            ממתינה
          </span>
        )}
        <IconChevRight size={14} className="text-ice-100/40 group-hover:text-ice-50 transition"/>
      </div>
    </button>
  );
};

  return (
    <button type="button" onClick={onToggle}
      className={`w-full flex items-center gap-3 p-3 rounded-2xl glass border ${tone.ring} hover:bg-white/[0.04] transition`}>

          <span>·</span>

      <div className="flex items-center gap-1 text-[10px] shrink-0">
        {done > 0 && (

            ✓ {done}
          </span>
        )}
        {issues > 0 && (

            ⚠ {issues}
          </span>

      <IconChevron size={18} className={`text-ice-100/40 transition-transform shrink-0 ${expanded ? 'rotate-180' : ''}`}/>

const BuildingGroups = ({ properties, inspections, onSelect, search }) => {
  const [collapsed, setCollapsed] = useState({});
  const isSearching = !!search.trim();

  // Group properties by building, preserving BUILDINGS order
  const groups = useMemo(() => {
    const byBuilding = {};
    properties.forEach(p => {
      const bid = p.building || 'other';
      if (!byBuilding[bid]) byBuilding[bid] = [];
      byBuilding[bid].push(p);
    });
    const orderedBuildings = BUILDINGS
      .filter(b => byBuilding[b.id] && byBuilding[b.id].length > 0)
      .map(b => ({ building: b, items: byBuilding[b.id] }));
    if (byBuilding['other']) {
      orderedBuildings.push({
        building: { id: 'other', name: 'אחר', emoji: '🏠', area: '—', accent: 'sky' },
        items: byBuilding['other']
      });
    }
    return orderedBuildings;
  }, [properties]);

  return (
    <div className="space-y-3 pb-6 stagger">
      {groups.map(({ building, items }, gi) => {
        const open = isSearching ? true : !collapsed[building.id];
        let done = 0, issues = 0;
        items.forEach(p => {
          const ins = inspections[p.id];
          if (ins?.completed) done += 1;
          else if (inspectionHasIssues(ins)) issues += 1;
        });
        return (
          <div key={building.id} className="space-y-2">
            <BuildingHeader building={building} count={items.length}
              done={done} issues={issues}
              expanded={open}
              onToggle={() => setCollapsed(c => ({ ...c, [building.id]: !c[building.id] }))}/>
            {open && (
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 px-1 pb-1 anim-fade-in">
                {items.map((p, i) => (
                  <AptCard key={p.id} property={p} inspection={inspections[p.id]} index={i}
                    onClick={() => onSelect(p.id)} />
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

const ApartmentGrid = ({ properties, inspections, setInspection, onSelect }) => {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return properties.filter(p => {
      if (q && !p.name.toLowerCase().includes(q)) return false;
      const ins = inspections[p.id];
      if (filter === 'done' && !ins?.completed) return false;
      if (filter === 'pending' && ins?.completed) return false;
      if (filter === 'issues' && !inspectionHasIssues(ins)) return false;
      return true;
    });
  }, [properties, inspections, search, filter]);

  const stats = useMemo(() => {
    let done = 0, issues = 0, inProg = 0;
    properties.forEach(p => {
      const ins = inspections[p.id];
      if (ins?.completed) done += 1;
      else if (inspectionHasIssues(ins)) issues += 1;
      else if (ins && inspectionProgress(ins) > 0) inProg += 1;
    });
    return { total: properties.length, done, issues, inProg };
  }, [properties, inspections]);

  const handleSelect = (id) => {
    if (!inspections[id]) setInspection(id, createBlankInspection());
    onSelect(id);
  };

  return (
    <div className="relative anim-fade-in">
      {/* Hero */}
      <div className="relative h-56 sm:h-64 overflow-hidden">
        <VantaHero/>
        <div className="absolute inset-0 bg-gradient-to-b from-night-950/30 via-night-950/10 to-night-950"/>
        <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-4 anim-slide-up">
          <div className="text-[10px] uppercase tracking-[0.4em] text-copper-300/80 display">Val Thorens · 3,230 m</div>
          <h1 className="display text-4xl sm:text-5xl text-ice-50 mt-1">בדיקת דירות</h1>
          <p className="text-xs text-ice-100/60 mt-1.5">{properties.length} דירות אלפיניות · ניהול מלא</p>
        </div>
      </div>

      <div className="px-4 -mt-6 relative z-10">
        {/* stats strip */}
        <div className="grid grid-cols-4 gap-2 mb-4 stagger">
          <div className="rounded-xl glass border border-white/10 p-2 text-center">
            <div className="display text-2xl text-ice-50">{stats.total}</div>
            <div className="text-[10px] text-ice-100/50 mt-0.5">סה"כ</div>
          </div>
          <div className="rounded-xl glass border border-emerald-400/30 p-2 text-center">
            <div className="display text-2xl text-emerald-300">{stats.done}</div>
            <div className="text-[10px] text-emerald-200/70 mt-0.5">הושלמו</div>
          </div>
          <div className="rounded-xl glass border border-sky-400/30 p-2 text-center">
            <div className="display text-2xl text-sky-300">{stats.inProg}</div>
            <div className="text-[10px] text-sky-200/70 mt-0.5">בטיפול</div>
          </div>
          <div className="rounded-xl glass border border-amber-400/30 p-2 text-center">
            <div className="display text-2xl text-amber-300">{stats.issues}</div>
            <div className="text-[10px] text-amber-200/70 mt-0.5">ליקויים</div>
          </div>
        </div>

        {/* search */}
        <div className="relative mb-3">
          <span className="absolute right-3 top-1/2 -translate-y-1/2 text-ice-100/40">
            <IconSearch size={18}/>
          </span>
          <input type="text" value={search} onChange={e => setSearch(e.target.value)}
            placeholder="חיפוש דירה לפי שם…"
            className="w-full pr-10 pl-3 py-3 rounded-xl glass border border-white/10 text-ice-50 placeholder-ice-100/40 focus:outline-none focus:ring-2 focus:ring-copper-500" />
        </div>

        {/* filters */}
        <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar -mx-1 px-1 pb-1">
          {[
            { key: 'all',     label: 'הכל',      icon: <IconFilter size={12}/> },
            { key: 'pending', label: 'ממתינות',   icon: null },
            { key: 'issues',  label: 'ליקויים',   icon: <IconAlert size={12}/> },
            { key: 'done',    label: 'הושלמו',    icon: <IconCheck size={12}/> },
          ].map(f => (
            <button key={f.key} type="button" onClick={() => setFilter(f.key)}
              className={`shrink-0 px-3 py-1.5 rounded-full text-xs font-bold border transition flex items-center gap-1 ${
                filter === f.key
                  ? 'bg-copper-500 text-white border-copper-500 shadow-[0_6px_20px_-8px_rgba(200,127,62,0.7)]'
                  : 'bg-white/[0.04] text-ice-100/70 border-white/10 hover:bg-white/[0.08]'
              }`}>
              {f.icon}
              {f.label}
            </button>
          ))}
        </div>

        {/* Building groups */}
        {filtered.length === 0 ? (
          <div className="rounded-2xl glass border border-white/10 p-10 text-center text-ice-100/50">
            לא נמצאו דירות תואמות
          </div>
        ) : (
          <BuildingGroups properties={filtered} inspections={inspections} onSelect={handleSelect} search={search}/>
        )}
      </div>
    </div>
  );
};

const SetupView = ({ properties, setProperties, inspections, setInspections, syncStatus }) => {
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({ name: '', capacity: 2, doubleBeds: 0 });
  const [adding, setAdding] = useState(false);

  const startEdit = (p) => { setEditingId(p.id); setDraft({ name: p.name, capacity: p.capacity, doubleBeds: p.doubleBeds }); setAdding(false); };
  const saveEdit = () => {
    setProperties(prev => prev.map(p => p.id === editingId
      ? { ...p, name: draft.name.trim() || p.name, capacity: Number(draft.capacity) || 1, doubleBeds: Number(draft.doubleBeds) || 0 }
      : p));
    setEditingId(null);
  };
  const cancelEdit = () => { setEditingId(null); setAdding(false); };
  const addProperty = () => {
    const name = draft.name.trim();
    if (!name) { alert('יש להזין שם דירה'); return; }
    const id = 'custom-' + Date.now();
    setProperties(prev => [...prev, { id, name, capacity: Number(draft.capacity) || 1, doubleBeds: Number(draft.doubleBeds) || 0 }]);
    setDraft({ name: '', capacity: 2, doubleBeds: 0 }); setAdding(false);
  };
  const deleteProperty = (id) => {
    if (!confirm('למחוק את הדירה? פעולה זו תמחק גם את הבדיקה השמורה שלה.')) return;
    setProperties(prev => prev.filter(p => p.id !== id));
    setInspections(prev => { const next = { ...prev }; delete next[id]; return next; });
  };
  const resetAll = () => {
    if (!confirm('לשחזר את רשימת ברירת המחדל ולמחוק את כל הבדיקות? פעולה לא הפיכה.')) return;
    setProperties(INITIAL_PROPERTIES); setInspections({});
  };

  return (
    <div className="px-4 py-4 space-y-3 anim-fade-in">
      <CloudSyncCard syncStatus={syncStatus} />
      <div className="rounded-2xl glass border border-white/10 p-4">
        <div className="flex items-center gap-2 text-ice-100">
          <IconSettings size={18}/>
          <h2 className="display text-2xl text-ice-50 leading-tight">הגדרות דירות</h2>
        </div>
        <p className="text-xs text-ice-100/50 mt-1">הוסף, ערוך או הסר דירות. כל שינוי נשמר אוטומטית במכשיר.</p>
        <div className="mt-3 grid grid-cols-2 gap-2">
          <button type="button" onClick={() => { setAdding(true); setEditingId(null); setDraft({ name: '', capacity: 2, doubleBeds: 0 }); }}
            className="flex items-center justify-center gap-2 py-2 px-3 rounded-xl bg-gradient-to-l from-copper-500 to-copper-400 text-white font-bold hover:brightness-110 shadow-[0_6px_20px_-8px_rgba(200,127,62,0.7)]">
            <IconPlus size={16}/> הוסף דירה
          </button>
          <button type="button" onClick={resetAll}
            className="flex items-center justify-center gap-2 py-2 px-3 rounded-xl bg-rose-500/10 text-rose-300 border border-rose-400/30 font-bold hover:bg-rose-500/20">
            <IconRefresh size={16}/> שחזר ברירת מחדל
          </button>
        </div>
      </div>

      {adding && (
        <div className="rounded-2xl glass-strong border-2 border-copper-500/50 p-4 anim-slide-up">
          <h3 className="font-bold text-ice-50 mb-3 display text-xl">דירה חדשה</h3>
          <div className="space-y-2">
            <input autoFocus type="text" value={draft.name} onChange={e => setDraft({ ...draft, name: e.target.value })}
              placeholder="שם הדירה"
              className="w-full px-3 py-2 rounded-lg bg-night-900/60 border border-white/15 text-ice-50 focus:outline-none focus:ring-2 focus:ring-copper-500" />
            <div className="grid grid-cols-2 gap-2">
              <label className="text-sm">
                <span className="block text-ice-100/70 mb-1">תפוסה</span>
                <input type="number" min="1" value={draft.capacity}
                  onChange={e => setDraft({ ...draft, capacity: e.target.value })}
                  className="w-full px-3 py-2 rounded-lg bg-night-900/60 border border-white/15 text-ice-50"/>
              </label>
              <label className="text-sm">
                <span className="block text-ice-100/70 mb-1">מיטות זוגיות</span>
                <input type="number" min="0" value={draft.doubleBeds}
                  onChange={e => setDraft({ ...draft, doubleBeds: e.target.value })}
                  className="w-full px-3 py-2 rounded-lg bg-night-900/60 border border-white/15 text-ice-50"/>
              </label>
            </div>
            <div className="flex gap-2 pt-2">
              <button type="button" onClick={addProperty}
                className="flex-1 py-2 rounded-lg bg-emerald-500 text-white font-bold hover:bg-emerald-400">שמור</button>
              <button type="button" onClick={cancelEdit}
                className="flex-1 py-2 rounded-lg bg-white/[0.06] text-ice-100 border border-white/10 font-semibold hover:bg-white/[0.1]">בטל</button>
            </div>
          </div>
        </div>
      )}

      <div className="space-y-2 stagger">
        {properties.map(p => {
          const isEditing = editingId === p.id;
          return (

              {!isEditing ? (
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-white/[0.05] text-ice-100 flex items-center justify-center shrink-0 border border-white/10">
                    <IconHome size={18}/>
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="font-bold text-ice-50 truncate display">{p.name}</p>
                    <div className="flex items-center gap-2 text-xs text-ice-100/50 mt-0.5">
                      <span>תפוסה {p.capacity}</span>
                      <span>•</span>
                      <span>זוגיות {p.doubleBeds}</span>
                    </div>
                  </div>
                  <button type="button" onClick={() => startEdit(p)}
                    className="p-2 rounded-lg text-ice-100/70 hover:bg-white/[0.06]" aria-label="ערוך">
                    <IconEdit size={18}/>
                  </button>
                  <button type="button" onClick={() => deleteProperty(p.id)}
                    className="p-2 rounded-lg text-rose-400 hover:bg-rose-500/10" aria-label="מחק">
                    <IconTrash size={18}/>
                  </button>
                </div>
              ) : (
                <div className="space-y-2">
                  <input type="text" value={draft.name} onChange={e => setDraft({ ...draft, name: e.target.value })}
                    className="w-full px-3 py-2 rounded-lg bg-night-900/60 border border-white/15 text-ice-50 focus:outline-none focus:ring-2 focus:ring-copper-500" />
                  <div className="grid grid-cols-2 gap-2">
                    <label className="text-sm">
                      <span className="block text-ice-100/70 mb-1">תפוסה</span>
                      <input type="number" min="1" value={draft.capacity}
                        onChange={e => setDraft({ ...draft, capacity: e.target.value })}
                        className="w-full px-3 py-2 rounded-lg bg-night-900/60 border border-white/15 text-ice-50"/>
                    </label>
                    <label className="text-sm">
                      <span className="block text-ice-100/70 mb-1">מיטות זוגיות</span>
                      <input type="number" min="0" value={draft.doubleBeds}
                        onChange={e => setDraft({ ...draft, doubleBeds: e.target.value })}
                        className="w-full px-3 py-2 rounded-lg bg-night-900/60 border border-white/15 text-ice-50"/>
                    </label>
                  </div>
                  <div className="flex gap-2 pt-1">
                    <button type="button" onClick={saveEdit}
                      className="flex-1 py-2 rounded-lg bg-emerald-500 text-white font-bold hover:bg-emerald-400">שמור</button>
                    <button type="button" onClick={cancelEdit}
                      className="flex-1 py-2 rounded-lg bg-white/[0.06] text-ice-100 border border-white/10 font-semibold hover:bg-white/[0.1]">בטל</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

const TargetsCalculator = ({ targets, setTargets }) => {
  const [open, setOpen] = useState(false);
  const [draftCategory, setDraftCategory] = useState('kitchen');
  const [draftItemKey, setDraftItemKey]   = useState('');
  const [draftPerPerson, setDraftPerPerson] = useState(2);

  const itemsForCategory = ALL_ITEMS_BY_CATEGORY[draftCategory] || [];
  const targetEntries = Object.entries(targets);

  const addTarget = () => {
    if (!draftItemKey || !draftPerPerson || draftPerPerson <= 0) return;
    const id = targetKey(draftCategory, draftItemKey);
    setTargets(prev => ({ ...prev, [id]: { category: draftCategory, key: draftItemKey, perPerson: Number(draftPerPerson) } }));
    setDraftItemKey('');
  };
  const removeTarget = (id) => {
    setTargets(prev => { const next = { ...prev }; delete next[id]; return next; });
  };

  return (
    <div className="rounded-2xl glass border border-copper-500/30 overflow-hidden">
      <button type="button" onClick={() => setOpen(o => !o)}
        className="w-full px-4 py-3 flex items-center gap-3 text-right hover:bg-white/[0.03]">
        <div className="w-10 h-10 rounded-xl bg-copper-500/15 border border-copper-500/30 text-copper-300 flex items-center justify-center shrink-0">
          <IconSettings size={18}/>

        <div className="flex-1 min-w-0">
          <div className="display text-base text-ice-50 leading-tight">מחשבון יעדים</div>
          <div className="text-[11px] text-ice-100/50 mt-0.5">קבע כמה לאדם — החישוב אוטומטי לכל הדירות</div>
        </div>
        {targetEntries.length > 0 && (
          <span className="shrink-0 px-2 py-0.5 rounded-full bg-copper-500/20 border border-copper-500/40 text-copper-200 text-[11px] font-bold tabular-nums">

            <div>
              <label className="block text-[10px] uppercase tracking-wider text-ice-100/50 mb-1">קטגוריה</label>

            <div>

                onChange={e => setDraftItemKey(e.target.value)}
                className="w-full px-3 py-2 rounded-lg bg-night-800 border border-white/10 text-ice-50 text-sm outline-none focus:border-copper-400">
                <option value="">— בחר פריט —</option>
                {itemsForCategory.map(it => (
                  <option key={it.key} value={it.key}>{it.label}</option>
                ))}

            </div>

          <div className="flex items-end gap-2">
            <div className="flex-1">
              <label className="block text-[10px] uppercase tracking-wider text-ice-100/50 mb-1">כמה לאדם</label>
              <div className="flex items-center gap-1 rounded-lg bg-night-800 border border-white/10 px-1">
                <button type="button" onClick={() => setDraftPerPerson(Math.max(1, draftPerPerson - 1))}

            <div className="space-y-1.5 pt-2 border-t border-white/5">

};

const ShoppingView = ({ properties, inspections, targets, setTargets }) => {
  const [groupBy, setGroupBy] = useState('item');

  const aggregate = useMemo(() => computeAggregateShortages(properties, inspections, targets), [properties, inspections, targets]);
  const byProperty = useMemo(() => properties
    .map(p => ({ property: p, list: computePropertyShortages(p, inspections[p.id], targets) }))
    .filter(x => x.list.length > 0), [properties, inspections, targets]);

  const totalQty   = aggregate.reduce((s, a) => s + a.totalQty, 0);
  const totalLines = aggregate.length;

  const printList = () => window.print();

  const copyAsText = async () => {
    const lines = ['רשימת קניות – Val Thorens', `נוצר: ${new Date().toLocaleString('he-IL')}`, ''];
    if (groupBy === 'item') {
      aggregate.forEach(row => {
        if (row.totalQty > 0) lines.push(`• ${row.label} — ${row.totalQty} יח׳`);
        else lines.push(`• ${row.label} — לבדוק`);
        row.breakdown.forEach(b => {
          const note = b.note ? ` [${b.note}]` : '';
          lines.push(`    - ${b.propertyName}: ${b.qty || (b.status === 'partial' ? 'חלקי' : 'חסר')}${note}`);
        });
      });
    } else {
      byProperty.forEach(({ property, list }) => {
        lines.push(`◆ ${property.name} (תפוסה ${property.capacity})`);
        list.forEach(it => {
          const note = it.note ? ` [${it.note}]` : '';
          lines.push(`    • ${it.label}: ${it.qty > 0 ? it.qty : (it.status === 'partial' ? 'חלקי' : 'חסר')}${note}`);
        });
        lines.push('');
      });
    }
    const text = lines.join('\n');
    try { await navigator.clipboard.writeText(text); alert('הרשימה הועתקה ללוח.'); }
    catch {
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a'); a.href = url;
      a.download = `shopping-list-${new Date().toISOString().slice(0,10)}.txt`;
      a.click(); URL.revokeObjectURL(url);
    }
  };

  if (aggregate.length === 0) {
    return (
      <div className="px-4 py-4 space-y-3 anim-fade-in">
        <TargetsCalculator targets={targets} setTargets={setTargets} />
        <div className="text-center pt-6">
          <div className="rounded-3xl glass-strong border border-emerald-400/30 p-8">
            <div className="w-20 h-20 rounded-full bg-emerald-500/15 border border-emerald-400/40 text-emerald-300 flex items-center justify-center mx-auto mb-3 anim-ember">
              <IconCheck size={36}/>
            </div>
            <h3 className="display text-2xl text-ice-50">אין כלום לקנות</h3>
            <p className="text-sm text-ice-100/50 mt-2">קבע יעד במחשבון ונראה כמה חסר בפועל.</p>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="px-4 py-4 space-y-3 anim-fade-in">
      <TargetsCalculator targets={targets} setTargets={setTargets} />
      <div className="grid grid-cols-3 gap-2 stagger">
        <div className="rounded-xl glass border border-white/10 p-3 text-center">
          <div className="display text-2xl text-ice-50">{totalLines}</div>
          <div className="text-[10px] text-ice-100/50 mt-0.5">פריטים</div>
        </div>
        <div className="rounded-xl glass border border-rose-400/30 p-3 text-center">
          <div className="display text-2xl text-rose-300">{totalQty}</div>
          <div className="text-[10px] text-rose-200/70 mt-0.5">סה"כ יח'</div>
        </div>
        <div className="rounded-xl glass border border-amber-400/30 p-3 text-center">
          <div className="display text-2xl text-amber-300">{byProperty.length}</div>
          <div className="text-[10px] text-amber-200/70 mt-0.5">דירות</div>
        </div>
      </div>

      <div className="flex flex-wrap gap-2 items-center justify-between">
        <div className="flex gap-1 p-1 glass rounded-xl border border-white/10">
          <button type="button" onClick={() => setGroupBy('item')}
            className={`px-3 py-1.5 rounded-lg text-sm font-bold transition ${groupBy === 'item' ? 'bg-copper-500 text-white' : 'text-ice-100/60 hover:bg-white/[0.05]'}`}>לפי פריט</button>
          <button type="button" onClick={() => setGroupBy('property')}
            className={`px-3 py-1.5 rounded-lg text-sm font-bold transition ${groupBy === 'property' ? 'bg-copper-500 text-white' : 'text-ice-100/60 hover:bg-white/[0.05]'}`}>לפי דירה</button>
        </div>
        <div className="flex gap-1">
          <button type="button" onClick={copyAsText}
            className="flex items-center gap-1 px-3 py-1.5 rounded-lg glass border border-white/10 text-ice-100 text-sm font-bold hover:bg-white/[0.06]">
            <IconCopy size={14}/> העתק
          </button>
          <button type="button" onClick={printList}
            className="flex items-center gap-1 px-3 py-1.5 rounded-lg glass border border-white/10 text-ice-100 text-sm font-bold hover:bg-white/[0.06]">
            <IconPrint size={14}/> הדפס
          </button>
        </div>
      </div>

      {groupBy === 'item' ? (
        <div className="space-y-2 stagger">
          {aggregate.map(row => {
            const meta = CATEGORY_META[row.category] || { label: row.category, accent: 'slate' };
            const tone = ROOM_ACCENT[meta.accent === 'orange' ? 'copper' : meta.accent] || ROOM_ACCENT.copper;
            return (
              <div key={`${row.category}:${row.itemKey}`} className="rounded-2xl glass border border-white/10 overflow-hidden">
                <div className="p-3 flex items-center gap-3">
                  <div className={`shrink-0 w-14 h-14 rounded-xl flex flex-col items-center justify-center ${tone.bg} border ${tone.ring}`}>
                    <span className="text-[9px] leading-none text-ice-100/70">לקנות</span>
                    <span className={`display text-xl leading-tight ${tone.text}`}>{row.totalQty || '·'}</span>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="font-bold text-ice-50 truncate">{row.label}</div>
                    <div className="flex items-center gap-2 text-xs text-ice-100/50 mt-0.5">
                      <span className={`px-1.5 py-0.5 rounded ${tone.bg} ${tone.text} border ${tone.ring}`}>{meta.label}</span>
                      <span>{row.breakdown.length} דירות</span>
                    </div>
                  </div>
                </div>
                <div className="border-t border-white/5 bg-night-950/30 px-3 py-2 space-y-1">
                  {row.breakdown.map((b, i) => (
                    <div key={i} className="flex items-start gap-2 text-sm text-ice-100/80">
                      <span className={`shrink-0 mt-1.5 w-2 h-2 rounded-full ${b.status === 'missing' ? 'bg-rose-400' : 'bg-amber-400'}`}/>
                      <span className="font-semibold truncate">{b.propertyName}</span>
                      <span className="shrink-0 text-ice-100/30">·</span>
                      <span className={`shrink-0 font-bold ${b.qty > 0 ? 'text-rose-300' : 'text-amber-300'}`}>
                        {b.qty > 0 ? `${b.qty} יח׳` : (b.status === 'partial' ? 'חלקי' : 'חסר')}
                      </span>
                      {b.note && <span className="text-ice-100/50 text-xs truncate">[{b.note}]</span>}
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        <div className="space-y-2 stagger">
          {byProperty.map(({ property, list }) => {
            const total = list.reduce((s, x) => s + x.qty, 0);
            return (
              <div key={property.id} className="rounded-2xl glass border border-white/10 overflow-hidden">
                <div className="p-3 flex items-center gap-3 border-b border-white/5 bg-night-950/30">
                  <div className="w-10 h-10 rounded-xl bg-copper-500/15 border border-copper-500/30 text-copper-300 flex items-center justify-center shrink-0">
                    <IconHome size={18}/>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="display font-bold text-ice-50 truncate">{property.name}</div>
                    <div className="text-xs text-ice-100/50">תפוסה {property.capacity} · {list.length} פריטים</div>
                  </div>
                  <div className="shrink-0 px-2 py-1 rounded-lg bg-rose-500/15 text-rose-200 border border-rose-400/30 text-sm font-extrabold">
                    {total} יח׳
                  </div>
                </div>
                <div className="p-2 space-y-1">
                  {list.map((it, i) => {
                    const meta = CATEGORY_META[it.category] || { label: it.category, accent: 'slate' };
                    const tone = ROOM_ACCENT[meta.accent === 'orange' ? 'copper' : meta.accent] || ROOM_ACCENT.copper;
                    return (
                      <div key={i} className="flex items-center gap-2 p-2 rounded-lg hover:bg-white/[0.03]">
                        <span className={`shrink-0 px-1.5 py-0.5 text-[10px] rounded ${tone.bg} ${tone.text} border ${tone.ring} font-semibold`}>{meta.label}</span>
                        <span className="font-semibold text-ice-100 flex-1 truncate">{it.label}</span>
                        <span className={`shrink-0 font-bold ${it.qty > 0 ? 'text-rose-300' : 'text-amber-300'}`}>
                          {it.qty > 0 ? `${it.qty} יח׳` : (it.status === 'partial' ? 'חלקי' : 'חסר')}
                        </span>
                        {it.note && <span className="text-xs text-ice-100/50 truncate hidden sm:inline">[{it.note}]</span>}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};
