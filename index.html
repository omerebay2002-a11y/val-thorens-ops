<style>
  html, body { height: 100%; }
  body {

  body::before {
    content: '';

  body::after {
    content: '';

  input, textarea, button, select { font-family: inherit; }

  .pt-safe { padding-top: max(0.5rem, env(safe-area-inset-top)); }

  /* ============ glass + frost ============ */
  .glass {
    background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);

    box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 20px 40px -20px rgba(0,0,0,0.6);
  }
  .glass-strong {
    background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
    backdrop-filter: blur(22px) saturate(150%);
    -webkit-backdrop-filter: blur(22px) saturate(150%);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .display { font-family: 'Fraunces', serif; font-feature-settings: 'ss01','ss02'; letter-spacing: -0.01em; }

  /* ============ animations ============ */
  @keyframes float-in {
    from { opacity: 0; transform: translateY(14px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulse-warn {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.6); }
    50%      { box-shadow: 0 0 0 10px rgba(248,113,113,0); }
  }
  @keyframes ring-ok {
    0%   { box-shadow: 0 0 0 0 rgba(52,211,153,0.7); }
    100% { box-shadow: 0 0 0 14px rgba(52,211,153,0); }
  }
  @keyframes drawer-open {
    from { transform: translateY(-12px); opacity: 0; max-height: 0; }
    to   { transform: translateY(0);     opacity: 1; max-height: 1200px; }
  }
  @keyframes ember {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.06); }
  }
  .anim-float-in { animation: float-in 0.55s cubic-bezier(0.2,0.8,0.2,1) both; }
  .anim-slide-up { animation: slide-up 0.5s cubic-bezier(0.2,0.8,0.2,1) both; }
  .anim-fade-in  { animation: fade-in 0.4s ease both; }
  .anim-warn     { animation: pulse-warn 1.6s ease-in-out infinite; }
  .anim-ok       { animation: ring-ok 0.7s ease-out; }
  .anim-drawer   { animation: drawer-open 0.45s cubic-bezier(0.2,0.8,0.2,1) both; }
  .anim-ember    { animation: ember 2.4s ease-in-out infinite; }

  /* stagger helpers */
  .stagger > * { animation: float-in 0.5s cubic-bezier(0.2,0.8,0.2,1) both; }
  .stagger > *:nth-child(1)  { animation-delay: 0.02s; }
  .stagger > *:nth-child(2)  { animation-delay: 0.06s; }
  .stagger > *:nth-child(3)  { animation-delay: 0.10s; }
  .stagger > *:nth-child(4)  { animation-delay: 0.14s; }
  .stagger > *:nth-child(5)  { animation-delay: 0.18s; }
  .stagger > *:nth-child(6)  { animation-delay: 0.22s; }
  .stagger > *:nth-child(7)  { animation-delay: 0.26s; }
  .stagger > *:nth-child(8)  { animation-delay: 0.30s; }
  .stagger > *:nth-child(9)  { animation-delay: 0.34s; }
  .stagger > *:nth-child(10) { animation-delay: 0.38s; }
  .stagger > *:nth-child(n+11) { animation-delay: 0.42s; }

  /* tilt */
  .tilt { transition: transform 0.3s cubic-bezier(0.2,0.8,0.2,1); transform-style: preserve-3d; }
  .tilt:hover { transform: perspective(800px) rotateX(2deg) rotateY(-2deg) translateY(-2px); }

  /* room tile glow */
  .room-tile {
    position: relative;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    transform-style: preserve-3d;
  }
  .room-tile:hover { transform: translateY(-3px) scale(1.01); }
  .room-tile::after {
    content: ''; position: absolute; inset: -2px; border-radius: inherit; pointer-events: none;
    background: radial-gradient(circle at var(--mx,50%) var(--my,40%), rgba(255,255,255,0.18), transparent 55%);
    opacity: 0; transition: opacity 0.35s ease;
  }
  .room-tile:hover::after { opacity: 1; }

  /* ===== status item ===== */
  .item-card {
    position: relative;
    transition: transform 0.18s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .item-card:active { transform: scale(0.97); }

  /* counter top illustration */
  .counter-grain {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 6px);
  }

  /* progress arc gradient stroke */
  .ring-glow {
    filter: drop-shadow(0 0 6px currentColor);
  }

  /* hide scrollbar in horizontal scrollers */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* ===== print ===== */
  @media print {
    body, body::before, body::after { background: white !important; color: #111 !important; }
    .no-print { display: none !important; }
    .glass, .glass-strong { background: white !important; backdrop-filter: none !important; border: 1px solid #ddd !important; box-shadow: none !important; color: #111 !important; }
  }

  /* boot loader */
  .boot-orb {
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #e8a47a, #c87f3e 45%, #7d4d20 95%);
    box-shadow: 0 0 60px 10px rgba(200,127,62,0.5), 0 0 140px 30px rgba(90,142,219,0.18);
    animation: ember 2.4s ease-in-out infinite;
  }
</style>

const safeLoad = (key, fallback) => {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    console.warn('Storage read failed:', key, e);
    return fallback;
  }
};

const safeSave = (key, val) => {
  try {

const inspectionProgress = (insp) => {
  if (!insp) return 0;
  const groups = ['kitchen','dining','bathroom','general'];
  let total = 0, done = 0;
  groups.forEach(g => {
    Object.values(insp[g] || {}).forEach(v => {
      total += 1;
      if (v.status && v.status !== 'pending') done += 1;
    });
  });
  const exitTotal = EXIT_CHECKLIST.length;
  const exitDone  = EXIT_CHECKLIST.filter(i => insp.exit?.[i.key]).length;
  total += exitTotal; done += exitDone;
  return total === 0 ? 0 : Math.round((done / total) * 100);
};

const inspectionHasIssues = (insp) => {
  if (!insp) return false;
  const groups = ['kitchen','dining','bathroom','general'];
  return groups.some(g =>
    Object.values(insp[g] || {}).some(v => v.status === 'partial' || v.status === 'missing')
  );
};

const computeShortage = (value, requiredCount, isMultiplier) => {
  if (!value || value.status === 'ok' || value.status === 'pending') return 0;
  if (isMultiplier && requiredCount) {
    if (value.status === 'missing') return requiredCount;
    if (value.status === 'partial') {
      const present = Number(value.presentCount);
      const safe = Number.isFinite(present) && present >= 0 ? present : 0;
      return Math.max(0, requiredCount - safe);
    }
  }
  return value.status === 'missing' || value.status === 'partial' ? 1 : 0;
};

const computePropertyShortages = (property, inspection) => {
  if (!inspection) return [];
  const out = [];
  const cap = property.capacity;
  const sources = [
    { category: 'kitchen',  items: KITCHEN_MULTIPLIERS },
    { category: 'kitchen',  items: KITCHEN_FIXED },
    { category: 'dining',   items: DINING_ITEMS },
    { category: 'bathroom', items: BATHROOM_ITEMS },
    { category: 'general',  items: GENERAL_ITEMS },
  ];
  sources.forEach(({ category, items }) => {
    items.forEach(item => {
      const v = inspection[category]?.[item.key];
      if (!v || v.status === 'ok' || v.status === 'pending') return;
      const { required, isCountable } = getItemRequired(item, cap);
      const qty = computeShortage(v, required, isCountable);
      out.push({ category, key: item.key, label: item.label, status: v.status, note: v.note || '',
                 required, presentCount: v.presentCount, qty, isMultiplier: isCountable });
    });
  });
  return out;
};

const computeAggregateShortages = (properties, inspections) => {
  const map = {};
  properties.forEach(p => {
    const list = computePropertyShortages(p, inspections[p.id]);
    list.forEach(entry => {
      const id = `${entry.category}:${entry.key}`;
      if (!map[id]) {
        map[id] = { itemKey: entry.key, label: entry.label, category: entry.category, totalQty: 0, breakdown: [] };
      }
      map[id].totalQty += entry.qty;
      map[id].breakdown.push({
        propertyId: p.id, propertyName: p.name,
        qty: entry.qty, status: entry.status, note: entry.note,
      });
    });
  });
  return Object.values(map).sort((a, b) => {
    if (a.category !== b.category) return a.category.localeCompare(b.category);
    return b.totalQty - a.totalQty;
  });
};

const compressImage = (file, maxDim = 1280, quality = 0.7) =>
  new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round(height * (maxDim / width));
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round(width * (maxDim / height));
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

const roomCategoryProgress = (insp, key) => {
  if (!insp) return { pct: 0, total: 0, done: 0, issues: 0 };
  if (key === 'kitchen') {
    const all = [...KITCHEN_MULTIPLIERS, ...KITCHEN_FIXED];
    const total = all.length;
    let done = 0, issues = 0;
    all.forEach(it => {
      const v = insp.kitchen?.[it.key];
      if (v?.status && v.status !== 'pending') done += 1;
      if (v?.status === 'partial' || v?.status === 'missing') issues += 1;
    });
    return { pct: total ? Math.round(done/total*100) : 0, total, done, issues };
  }
  if (key === 'dining' || key === 'bathroom' || key === 'general') {
    const items = key === 'dining' ? DINING_ITEMS : key === 'bathroom' ? BATHROOM_ITEMS : GENERAL_ITEMS;
    let done = 0, issues = 0;
    items.forEach(it => {
      const v = insp[key]?.[it.key];
      if (v?.status && v.status !== 'pending') done += 1;
      if (v?.status === 'partial' || v?.status === 'missing') issues += 1;
    });
    return { pct: items.length ? Math.round(done/items.length*100) : 0, total: items.length, done, issues };
  }
  if (key === 'maintenance') {
    const has = (insp.maintenance?.renovations?.trim()?.length || 0) > 0 || insp.maintenance?.photos?.length > 0;
    return { pct: has ? 100 : 0, total: 1, done: has ? 1 : 0, issues: 0 };
  }
  if (key === 'exit') {
    const total = EXIT_CHECKLIST.length;
    const done = EXIT_CHECKLIST.filter(i => insp.exit?.[i.key]).length;
    return { pct: total ? Math.round(done/total*100) : 0, total, done, issues: 0 };
  }
  return { pct: 0, total: 0, done: 0, issues: 0 };
};

const ProgressRing = ({ pct, size = 64, stroke = 6, color = '#34d399', track = 'rgba(255,255,255,0.08)', label }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return (
    <div className="relative" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={r} stroke={track} strokeWidth={stroke} fill="none" />
        <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
                strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset}
                style={{ transition: 'stroke-dashoffset 0.6s cubic-bezier(0.2,0.8,0.2,1)' }}
                className="ring-glow" />
      </svg>
      <div className="absolute inset-0 flex items-center justify-center text-xs font-bold text-ice-100">
        {label ?? `${pct}%`}
      </div>
    </div>
  );
};

const IsoKitchenScene = ({ inspection, onTap }) => {
  const T  = 22;          // tile size px
  const OX = 280;         // origin x
  const OY = 70;          // origin y
  const px = (x, y) => OX + (x - y) * 0.866 * T;
  const py = (x, y, z = 0) => OY + (x + y) * 0.5 * T - z * T;
  const pt = (x, y, z = 0) => `${px(x, y).toFixed(1)},${py(x, y, z).toFixed(1)}`;

  const polyTop   = (x, y, w, d, z)       => `${pt(x,y,z)} ${pt(x+w,y,z)} ${pt(x+w,y+d,z)} ${pt(x,y+d,z)}`;
  const polyFront = (x, y, w, d, z0, z1)  => `${pt(x,y+d,z1)} ${pt(x+w,y+d,z1)} ${pt(x+w,y+d,z0)} ${pt(x,y+d,z0)}`;
  const polyRight = (x, y, w, d, z0, z1)  => `${pt(x+w,y,z1)} ${pt(x+w,y+d,z1)} ${pt(x+w,y+d,z0)} ${pt(x+w,y,z0)}`;

  const STATUS_GLOW = { ok: '#34d399', partial: '#fbbf24', missing: '#fb7185', pending: null };
  const get = (key) => inspection.kitchen[key] || blankStatus();

  const App = ({ keyName, x, y, w, d, h, baseZ = 0, faceColor, topColor, sideColor, accent, emoji, badge }) => {
    const v = get(keyName);
    const glow = STATUS_GLOW[v.status] || null;
    const z0 = baseZ;
    const z1 = baseZ + h;
    const cx = px(x + w/2, y + d/2);
    const cyTop = py(x + w/2, y + d/2, z1);
    return (
      <g onClick={() => onTap(keyName)} style={{ cursor: 'pointer' }} className="iso-app">
        {glow && (
          <ellipse cx={cx} cy={py(x+w/2, y+d/2, z0)} rx={Math.max(w, d)*T*0.55} ry={Math.max(w, d)*T*0.27}
            fill={glow} opacity="0.55" style={{ filter: 'blur(8px)' }} />
        )}
        <polygon points={polyRight(x, y, w, d, z0, z1)} fill={sideColor || faceColor} stroke="rgba(0,0,0,0.45)" strokeWidth="0.7" />
        <polygon points={polyFront(x, y, w, d, z0, z1)} fill={faceColor}              stroke="rgba(0,0,0,0.45)" strokeWidth="0.7" />
        <polygon points={polyTop(x, y, w, d, z1)}       fill={topColor  || faceColor} stroke="rgba(0,0,0,0.35)" strokeWidth="0.7" />
        {accent}
        {emoji && (
          <text x={cx} y={cyTop + 4} textAnchor="middle" fontSize="13"
            style={{ userSelect: 'none', pointerEvents: 'none' }}>{emoji}</text>
        )}
        {badge != null && (
          <g style={{ pointerEvents: 'none' }}>
            <rect x={cx - 9} y={cyTop - 18} width="18" height="11" rx="3"
              fill="rgba(10,22,40,0.85)" stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
            <text x={cx} y={cyTop - 9.5} textAnchor="middle" fontSize="8" fill="#e6eef7" fontWeight="700">{badge}</text>

const normalizePhotos = (photos) => (photos || [])
  .map(p => typeof p === 'string' ? { src: p, note: '' } : (p && typeof p === 'object' ? { src: p.src || '', note: p.note || '' } : null))
  .filter(Boolean);

const MaintenancePanel = ({ inspection, onChange }) => {
  const fileInputRef = useRef(null);
  const update = (m) => onChange({ ...inspection, maintenance: m, updatedAt: Date.now() });
  const photos = normalizePhotos(inspection.maintenance.photos);

  const handleFiles = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    try {
      const newPhotos = await Promise.all(files.map(async f => ({ src: await compressImage(f), note: '' })));
      update({ ...inspection.maintenance, photos: [...photos, ...newPhotos] });
    } catch (err) { console.error(err); alert('טעינת התמונה נכשלה.'); }
    finally { e.target.value = ''; }
  };

  const removePhoto = (idx) => update({ ...inspection.maintenance, photos: photos.filter((_, i) => i !== idx) });
  const setPhotoNote = (idx, note) => update({ ...inspection.maintenance, photos: photos.map((p, i) => i === idx ? { ...p, note } : p) });

  return (
    <div className="space-y-3">
      <div className="rounded-2xl glass-strong border border-rose-400/30 p-4">
        <div className="flex items-center gap-3 mb-3">
          <div className="w-12 h-12 rounded-xl bg-rose-500/15 flex items-center justify-center text-2xl">🔧</div>
          <div>
            <div className="display text-2xl text-ice-50 leading-tight">תחזוקה ושיפוצים</div>

/* =========================================================
   10. EXIT CHECKPOINT
   ========================================================= */

const ExitCheckpoint = ({ inspection, onChange }) => {
  const update = (k, v) => onChange({ ...inspection, exit: { ...inspection.exit, [k]: v }, updatedAt: Date.now() });
  const allChecked = EXIT_CHECKLIST.every(i => inspection.exit[i.key]);

  const completeInspection = () => {
    if (!allChecked) return;
    onChange({ ...inspection, completed: true, completedAt: Date.now(), updatedAt: Date.now() });
  };
  const reopenInspection = () => onChange({ ...inspection, completed: false, completedAt: null, updatedAt: Date.now() });

  return (
    <div className="rounded-2xl glass-strong border border-amber-400/30 p-4 space-y-3">
      <div className="flex items-center gap-3">
        <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-2xl transition ${allChecked ? 'bg-emerald-500/20 anim-ember' : 'bg-amber-500/15'}`}>
          {allChecked ? '🔓' : '🔐'}
        </div>
        <div>
          <div className="display text-2xl text-ice-50 leading-tight">פרוטוקול יציאה</div>
          <div className="text-xs text-ice-100/50">חובה לאשר את כל 6 הסעיפים</div>
        </div>
      </div>

      <div className="space-y-2 stagger">
        {EXIT_CHECKLIST.map((item, idx) => {
          const checked = inspection.exit[item.key];
          return (
            <button key={item.key} type="button" onClick={() => update(item.key, !checked)}
              className={`w-full flex items-center gap-3 p-3 rounded-xl border-2 text-right transition active:scale-[0.99] ${
                checked ? 'bg-emerald-500/15 border-emerald-400/60 text-emerald-100' : 'bg-night-900/40 border-white/10 text-ice-100 hover:border-white/20'
              }`}>
              <span className={`shrink-0 w-7 h-7 rounded-md border-2 flex items-center justify-center transition ${checked ? 'bg-emerald-500 border-emerald-500' : 'bg-night-900 border-white/20'}`}>
                {checked && <IconCheck size={16}/>}
              </span>
              <span className="font-semibold flex-1">{idx + 1}. {item.label}</span>
            </button>
          );
        })}
      </div>

      {!inspection.completed ? (
        <button type="button" disabled={!allChecked} onClick={completeInspection}
          className={`w-full py-4 rounded-xl font-extrabold text-base transition flex items-center justify-center gap-2 ${
            allChecked
              ? 'bg-gradient-to-l from-emerald-500 to-emerald-400 text-white shadow-[0_8px_30px_-10px_rgba(52,211,153,0.7)] active:scale-[0.99]'
              : 'bg-white/[0.05] text-ice-100/40 cursor-not-allowed border border-white/10'
          }`}>
          {allChecked ? <IconCheck size={20}/> : <IconLock size={20}/>}
          {allChecked ? 'סיים בדיקה ונעל' : 'נעול – יש לאשר את כל הסעיפים'}
        </button>
      ) : (
        <div className="space-y-2">
          <div className="flex items-center justify-center gap-2 py-3 rounded-xl bg-emerald-500/15 border border-emerald-400/40 text-emerald-200 font-bold">
            <IconCheck size={18}/> הבדיקה הושלמה {inspection.completedAt ? `– ${new Date(inspection.completedAt).toLocaleString('he-IL')}` : ''}
          </div>
          <button type="button" onClick={reopenInspection}
            className="w-full py-2 rounded-xl bg-white/[0.05] hover:bg-white/[0.08] border border-white/15 text-ice-100 font-semibold flex items-center justify-center gap-2">
            <IconRefresh size={16}/> פתח מחדש לעריכה
          </button>
        </div>
      )}
    </div>
  );
};

const RoomScreen = ({ property, inspection, roomKey, onChange }) => {
  const cap = property.capacity;
  if (roomKey === 'kitchen') {
    return <KitchenDiagram inspection={inspection} capacity={cap} onChange={onChange} />;
  }
  if (roomKey === 'dining') {
    return <RoomDiagram title="פינת אוכל וסלון" subtitle="ישיבה, שולחן, TV, תאורה" glyph="🛋️"
      items={DINING_ITEMS} inspectionRoom={inspection.dining} capacity={cap} accent="sky" group="dining"
      onChange={(d) => onChange({ ...inspection, dining: d, updatedAt: Date.now() })} />;
  }
  if (roomKey === 'bathroom') {
    return <RoomDiagram title="חדר רחצה" subtitle={`מקלחת, אסלה, ${cap} מגבות`} glyph="🚿"
      items={BATHROOM_ITEMS} inspectionRoom={inspection.bathroom} capacity={cap} accent="purple" group="bathroom"
      onChange={(d) => onChange({ ...inspection, bathroom: d, updatedAt: Date.now() })} />;
  }
  if (roomKey === 'general') {
    return <RoomDiagram title="חדרי שינה" subtitle={`${cap} מזרנים, ${cap} כריות, ${cap} שמיכות, חימום`} glyph="🛏️"
      items={GENERAL_ITEMS} inspectionRoom={inspection.general} capacity={cap} accent="emerald" group="general"
      onChange={(d) => onChange({ ...inspection, general: d, updatedAt: Date.now() })} />;
  }
  if (roomKey === 'maintenance') {
    return <MaintenancePanel inspection={inspection} onChange={onChange} />;
  }
  if (roomKey === 'exit') {
    return <ExitCheckpoint inspection={inspection} onChange={onChange} />;
  }
  return null;
};

const VantaHero = () => {
  const ref = useRef(null);
  const effectRef = useRef(null);
  useEffect(() => {
    if (!window.VANTA || !ref.current) return;
    effectRef.current = window.VANTA.FOG({
      el: ref.current, THREE: window.THREE,
      mouseControls: false, touchControls: false, gyroControls: false,
      highlightColor: 0xc87f3e, midtoneColor: 0x2a4f8a, lowlightColor: 0x0a1628, baseColor: 0x05080f,
      blurFactor: 0.65, speed: 1.0, zoom: 0.85,
    });
    return () => { effectRef.current?.destroy(); };
  }, []);
  return <div ref={ref} className="absolute inset-0"/>;
};

  const issues = inspectionHasIssues(inspection);

  const tone = completed ? 'emerald' : issues ? 'amber' : progress > 0 ? 'sky' : 'slate';
  const ring = completed ? 'border-emerald-400/40' : issues ? 'border-amber-400/40' : progress > 0 ? 'border-sky-400/30' : 'border-white/10';
  const ringColor = completed ? '#34d399' : issues ? '#fbbf24' : progress > 0 ? '#5a8edb' : '#94a3b8';

  return (
    <button type="button" onClick={onClick}
      className={`group relative tilt rounded-2xl glass border ${ring} p-3 text-right overflow-hidden`}
      style={{ animationDelay: `${Math.min(index*30, 600)}ms` }}>
      <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition" style={{ background: 'radial-gradient(circle at 30% 20%, rgba(255,255,255,0.06), transparent 60%)' }}/>
      <div className="relative flex items-center gap-3">
        <ProgressRing pct={progress} size={48} stroke={4} color={ringColor} />
        <div className="flex-1 min-w-0">
          <div className="display text-base text-ice-50 truncate leading-tight">{property.name}</div>
          <div className="text-[11px] text-ice-100/50 flex items-center gap-2 mt-0.5">
            <span>תפוסה {property.capacity}</span>

        </div>
      </div>

        {completed ? (
          <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] bg-emerald-500/15 text-emerald-200 border border-emerald-400/30 font-bold">
            <IconCheck size={10}/> הושלמה

        ) : issues ? (
          <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] bg-amber-500/15 text-amber-200 border border-amber-400/30 font-bold">
            <IconAlert size={10}/> ליקויים
          </span>
        ) : progress > 0 ? (
          <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] bg-sky-400/15 text-sky-200 border border-sky-400/30 font-bold">

          </span>
        ) : (
          <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] bg-white/[0.04] text-ice-100/50 border border-white/10 font-bold">
            ממתינה
          </span>
        )}
        <IconChevRight size={14} className="text-ice-100/40 group-hover:text-ice-50 transition"/>
      </div>
    </button>
  );
};

const ApartmentGrid = ({ properties, inspections, setInspection, onSelect }) => {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return properties.filter(p => {
      if (q && !p.name.toLowerCase().includes(q)) return false;
      const ins = inspections[p.id];
      if (filter === 'done' && !ins?.completed) return false;
      if (filter === 'pending' && ins?.completed) return false;
      if (filter === 'issues' && !inspectionHasIssues(ins)) return false;
      return true;
    });
  }, [properties, inspections, search, filter]);

  const stats = useMemo(() => {
    let done = 0, issues = 0, inProg = 0;
    properties.forEach(p => {
      const ins = inspections[p.id];
      if (ins?.completed) done += 1;
      else if (inspectionHasIssues(ins)) issues += 1;
      else if (ins && inspectionProgress(ins) > 0) inProg += 1;
    });
    return { total: properties.length, done, issues, inProg };
  }, [properties, inspections]);

  const handleSelect = (id) => {
    if (!inspections[id]) setInspection(id, createBlankInspection());
    onSelect(id);
  };

  return (
    <div className="relative anim-fade-in">
      {/* Hero */}
      <div className="relative h-56 sm:h-64 overflow-hidden">
        <VantaHero/>
        <div className="absolute inset-0 bg-gradient-to-b from-night-950/30 via-night-950/10 to-night-950"/>
        <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-4 anim-slide-up">
          <div className="text-[10px] uppercase tracking-[0.4em] text-copper-300/80 display">Val Thorens · 3,230 m</div>
          <h1 className="display text-4xl sm:text-5xl text-ice-50 mt-1">בדיקת דירות</h1>
          <p className="text-xs text-ice-100/60 mt-1.5">{properties.length} דירות אלפיניות · ניהול מלא</p>
        </div>
      </div>

      <div className="px-4 -mt-6 relative z-10">
        {/* stats strip */}
        <div className="grid grid-cols-4 gap-2 mb-4 stagger">
          <div className="rounded-xl glass border border-white/10 p-2 text-center">
            <div className="display text-2xl text-ice-50">{stats.total}</div>
            <div className="text-[10px] text-ice-100/50 mt-0.5">סה"כ</div>
          </div>
          <div className="rounded-xl glass border border-emerald-400/30 p-2 text-center">
            <div className="display text-2xl text-emerald-300">{stats.done}</div>
            <div className="text-[10px] text-emerald-200/70 mt-0.5">הושלמו</div>
          </div>
          <div className="rounded-xl glass border border-sky-400/30 p-2 text-center">
            <div className="display text-2xl text-sky-300">{stats.inProg}</div>
            <div className="text-[10px] text-sky-200/70 mt-0.5">בטיפול</div>
          </div>
          <div className="rounded-xl glass border border-amber-400/30 p-2 text-center">
            <div className="display text-2xl text-amber-300">{stats.issues}</div>
            <div className="text-[10px] text-amber-200/70 mt-0.5">ליקויים</div>
          </div>
        </div>

        {/* search */}
        <div className="relative mb-3">
          <span className="absolute right-3 top-1/2 -translate-y-1/2 text-ice-100/40">
            <IconSearch size={18}/>
          </span>
          <input type="text" value={search} onChange={e => setSearch(e.target.value)}
            placeholder="חיפוש דירה לפי שם…"
            className="w-full pr-10 pl-3 py-3 rounded-xl glass border border-white/10 text-ice-50 placeholder-ice-100/40 focus:outline-none focus:ring-2 focus:ring-copper-500" />
        </div>

        {/* filters */}
        <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar -mx-1 px-1 pb-1">
          {[
            { key: 'all',     label: 'הכל',      icon: <IconFilter size={12}/> },
            { key: 'pending', label: 'ממתינות',   icon: null },
            { key: 'issues',  label: 'ליקויים',   icon: <IconAlert size={12}/> },
            { key: 'done',    label: 'הושלמו',    icon: <IconCheck size={12}/> },
          ].map(f => (
            <button key={f.key} type="button" onClick={() => setFilter(f.key)}
              className={`shrink-0 px-3 py-1.5 rounded-full text-xs font-bold border transition flex items-center gap-1 ${
                filter === f.key
                  ? 'bg-copper-500 text-white border-copper-500 shadow-[0_6px_20px_-8px_rgba(200,127,62,0.7)]'
                  : 'bg-white/[0.04] text-ice-100/70 border-white/10 hover:bg-white/[0.08]'
              }`}>
              {f.icon}
              {f.label}
            </button>
          ))}
        </div>

        {/* grid */}
        {filtered.length === 0 ? (
          <div className="rounded-2xl glass border border-white/10 p-10 text-center text-ice-100/50">
            לא נמצאו דירות תואמות
          </div>
        ) : (
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 pb-6 stagger">
            {filtered.map((p, i) => (
              <AptCard key={p.id} property={p} inspection={inspections[p.id]} index={i}
                onClick={() => handleSelect(p.id)} />
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

/* =========================================================
   14. SETUP VIEW  (preserved with re-skinned UI)
   ========================================================= */

const SetupView = ({ properties, setProperties, inspections, setInspections }) => {
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({ name: '', capacity: 2, doubleBeds: 0 });
  const [adding, setAdding] = useState(false);

  const startEdit = (p) => { setEditingId(p.id); setDraft({ name: p.name, capacity: p.capacity, doubleBeds: p.doubleBeds }); setAdding(false); };
  const saveEdit = () => {
    setProperties(prev => prev.map(p => p.id === editingId
      ? { ...p, name: draft.name.trim() || p.name, capacity: Number(draft.capacity) || 1, doubleBeds: Number(draft.doubleBeds) || 0 }
      : p));
    setEditingId(null);
  };
  const cancelEdit = () => { setEditingId(null); setAdding(false); };
  const addProperty = () => {
    const name = draft.name.trim();
    if (!name) { alert('יש להזין שם דירה'); return; }
    const id = 'custom-' + Date.now();
    setProperties(prev => [...prev, { id, name, capacity: Number(draft.capacity) || 1, doubleBeds: Number(draft.doubleBeds) || 0 }]);
    setDraft({ name: '', capacity: 2, doubleBeds: 0 }); setAdding(false);
  };
  const deleteProperty = (id) => {
    if (!confirm('למחוק את הדירה? פעולה זו תמחק גם את הבדיקה השמורה שלה.')) return;
    setProperties(prev => prev.filter(p => p.id !== id));
    setInspections(prev => { const next = { ...prev }; delete next[id]; return next; });
  };
  const resetAll = () => {
    if (!confirm('לשחזר את רשימת ברירת המחדל ולמחוק את כל הבדיקות? פעולה לא הפיכה.')) return;
    setProperties(INITIAL_PROPERTIES); setInspections({});
  };

  return (
    <div className="px-4 py-4 space-y-3 anim-fade-in">
      <div className="rounded-2xl glass border border-white/10 p-4">
        <div className="flex items-center gap-2 text-ice-100">
          <IconSettings size={18}/>

const ShoppingView = ({ properties, inspections }) => {
  const [groupBy, setGroupBy] = useState('item');

  const aggregate = useMemo(() => computeAggregateShortages(properties, inspections), [properties, inspections]);
  const byProperty = useMemo(() => properties
    .map(p => ({ property: p, list: computePropertyShortages(p, inspections[p.id]) }))
    .filter(x => x.list.length > 0), [properties, inspections]);

  const totalQty   = aggregate.reduce((s, a) => s + a.totalQty, 0);
  const totalLines = aggregate.length;

  const printList = () => window.print();

  const copyAsText = async () => {
    const lines = ['רשימת קניות – Val Thorens', `נוצר: ${new Date().toLocaleString('he-IL')}`, ''];
    if (groupBy === 'item') {
      aggregate.forEach(row => {
        if (row.totalQty > 0) lines.push(`• ${row.label} — ${row.totalQty} יח׳`);
        else lines.push(`• ${row.label} — לבדוק`);
        row.breakdown.forEach(b => {
          const note = b.note ? ` [${b.note}]` : '';
          lines.push(`    - ${b.propertyName}: ${b.qty || (b.status === 'partial' ? 'חלקי' : 'חסר')}${note}`);
        });
      });
    } else {
      byProperty.forEach(({ property, list }) => {
        lines.push(`◆ ${property.name} (תפוסה ${property.capacity})`);
        list.forEach(it => {
          const note = it.note ? ` [${it.note}]` : '';
          lines.push(`    • ${it.label}: ${it.qty > 0 ? it.qty : (it.status === 'partial' ? 'חלקי' : 'חסר')}${note}`);
        });
        lines.push('');
      });
    }
    const text = lines.join('\n');
    try { await navigator.clipboard.writeText(text); alert('הרשימה הועתקה ללוח.'); }
    catch {
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a'); a.href = url;
      a.download = `shopping-list-${new Date().toISOString().slice(0,10)}.txt`;
      a.click(); URL.revokeObjectURL(url);
    }
  };

  if (aggregate.length === 0) {
    return (
      <div className="px-4 py-10 text-center anim-fade-in">
        <div className="rounded-3xl glass-strong border border-emerald-400/30 p-8">

        </div>
      </div>
    );
  }

  return (
    <div className="px-4 py-4 space-y-3 anim-fade-in">
      <div className="grid grid-cols-3 gap-2 stagger">
        <div className="rounded-xl glass border border-white/10 p-3 text-center">
          <div className="display text-2xl text-ice-50">{totalLines}</div>
          <div className="text-[10px] text-ice-100/50 mt-0.5">פריטים</div>
        </div>
        <div className="rounded-xl glass border border-rose-400/30 p-3 text-center">
          <div className="display text-2xl text-rose-300">{totalQty}</div>
          <div className="text-[10px] text-rose-200/70 mt-0.5">סה"כ יח'</div>
        </div>
        <div className="rounded-xl glass border border-amber-400/30 p-3 text-center">
          <div className="display text-2xl text-amber-300">{byProperty.length}</div>
          <div className="text-[10px] text-amber-200/70 mt-0.5">דירות</div>
        </div>
      </div>

      <div className="flex flex-wrap gap-2 items-center justify-between">
        <div className="flex gap-1 p-1 glass rounded-xl border border-white/10">
          <button type="button" onClick={() => setGroupBy('item')}
            className={`px-3 py-1.5 rounded-lg text-sm font-bold transition ${groupBy === 'item' ? 'bg-copper-500 text-white' : 'text-ice-100/60 hover:bg-white/[0.05]'}`}>לפי פריט</button>
          <button type="button" onClick={() => setGroupBy('property')}
            className={`px-3 py-1.5 rounded-lg text-sm font-bold transition ${groupBy === 'property' ? 'bg-copper-500 text-white' : 'text-ice-100/60 hover:bg-white/[0.05]'}`}>לפי דירה</button>
        </div>
        <div className="flex gap-1">
          <button type="button" onClick={copyAsText}
            className="flex items-center gap-1 px-3 py-1.5 rounded-lg glass border border-white/10 text-ice-100 text-sm font-bold hover:bg-white/[0.06]">
            <IconCopy size={14}/> העתק
          </button>
          <button type="button" onClick={printList}
            className="flex items-center gap-1 px-3 py-1.5 rounded-lg glass border border-white/10 text-ice-100 text-sm font-bold hover:bg-white/[0.06]">
            <IconPrint size={14}/> הדפס

      </div>

      {groupBy === 'item' ? (

          {aggregate.map(row => {

const ConnectModal = ({ onClose }) => {
  const [qrUrl, setQrUrl] = useState(null);
  const [error, setError] = useState(null);
  const [copied, setCopied] = useState(false);
  const url = window.location.href;
  const isFile = window.location.protocol === 'file:';

  useEffect(() => {
    if (isFile) return;
    if (!window.QRCode) { setError('ספריית QR לא נטענה.'); return; }
    window.QRCode.toDataURL(url, { width: 320, margin: 1, errorCorrectionLevel: 'M' })
      .then(setQrUrl)
      .catch(err => setError(err.message || 'שגיאה ביצירת QR'));
  }, [url, isFile]);

  const copyUrl = async () => {
    try { await navigator.clipboard.writeText(url); setCopied(true); setTimeout(() => setCopied(false), 1500); }
    catch { alert('העתקה נכשלה. הכתובת:\n' + url); }
  };

  return (
    <div className="fixed inset-0 z-50 bg-night-950/80 backdrop-blur-md flex items-end sm:items-center justify-center p-3 anim-fade-in"
         onClick={onClose}>
      <div className="rounded-3xl glass-strong border border-white/15 w-full max-w-md max-h-[90vh] overflow-y-auto anim-slide-up"

                    <pre className="bg-night-950 text-ice-100 text-xs rounded-lg p-2 mt-1 overflow-x-auto" dir="ltr">python -m http.server 8000</pre>
                    בטלפון: <code className="bg-white/10 px-1 rounded">http://&lt;IP&gt;:8000</code></li>
                  <li><b>אחסון בענן:</b> העלה את <code className="bg-white/10 px-1 rounded">index.html</code> ל־OneDrive/Drive ופתח את הקישור בטלפון.</li>

const App = () => {

  const [inspections, setInspections] = useState(() => safeLoad(STORAGE_KEYS.inspections, {}));
  const [showConnect, setShowConnect] = useState(false);

  // Navigation: which apartment is open, and which room inside it.
  const [selectedAptId, setSelectedAptId] = useState(null);
  const [selectedRoom, setSelectedRoom] = useState(null);

  useEffect(() => { safeSave(STORAGE_KEYS.properties, properties); }, [properties]);
  useEffect(() => { safeSave(STORAGE_KEYS.inspections, inspections); }, [inspections]);

  const setInspection = useCallback((id, ins) => {
    setInspections(prev => ({ ...prev, [id]: ins }));
  }, []);

  const exportJSON = () => {
    const payload = { exportedAt: new Date().toISOString(), version: 2, properties, inspections };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,19).replace(/[T:]/g, '-');
    a.href = url; a.download = `valthorens-inspections-${stamp}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importInputRef = useRef(null);
  const importJSON = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.properties || !data.inspections) throw new Error('bad format');
      if (!confirm('פעולה זו תחליף את כל הנתונים השמורים. להמשיך?')) return;
      setProperties(data.properties); setInspections(data.inspections);
      alert('הייבוא הושלם בהצלחה.');
    } catch (err) { alert('הקובץ לא תקין.'); console.error(err); }
    finally { e.target.value = ''; }
  };

  // Switching modes resets navigation
  const switchMode = (m) => { setMode(m); setSelectedAptId(null); setSelectedRoom(null); };

  const property = selectedAptId ? properties.find(p => p.id === selectedAptId) : null;
  const inspection = selectedAptId ? (inspections[selectedAptId] || createBlankInspection()) : null;
  const currentRoom = selectedRoom ? ROOMS.find(r => r.key === selectedRoom) : null;

  const handleInspectionChange = (ins) => {
    setInspection(selectedAptId, { ...ins, updatedAt: Date.now() });
  };

  // Breadcrumb / back behavior
  const goBack = () => {
    if (selectedRoom) setSelectedRoom(null);
    else if (selectedAptId) setSelectedAptId(null);
  };

  return (
    <div className="min-h-screen flex flex-col relative">
      {/* Header */}
      <header className="bg-night-950/80 backdrop-blur-xl text-ice-50 pt-safe sticky top-0 z-30 border-b border-white/5 no-print">
        <div className="px-4 py-3">
          <div className="flex items-center justify-between gap-2">
            <div className="flex items-center gap-2 min-w-0 flex-1">
              {(selectedAptId || selectedRoom) && mode === 'inspect' ? (
                <button type="button" onClick={goBack}
                  className="p-2 -mr-2 rounded-lg hover:bg-white/[0.05] text-ice-100 transition" aria-label="חזרה">
                  <IconArrowLeft size={20}/>
                </button>
              ) : (
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-copper-500 to-copper-600 flex items-center justify-center shadow-[0_4px_20px_-6px_rgba(200,127,62,0.7)] shrink-0">
                  <IconMountain size={18} className="text-white"/>
                </div>
              )}
              <div className="min-w-0">
                {selectedAptId && property ? (
                  <div className="min-w-0">
                    <p className="text-[10px] text-copper-300/70 uppercase tracking-[0.18em] display leading-none">
                      {currentRoom ? property.name : 'Workspace'}
                    </p>
                    <h1 className="display text-base text-ice-50 leading-tight truncate">
                      {currentRoom ? currentRoom.label : property.name}
                    </h1>
                  </div>
                ) : (
                  <div>
                    <h1 className="display text-base leading-tight">בדיקת דירות</h1>
                    <p className="text-[10px] text-ice-100/50 leading-tight">Val Thorens · {properties.length} דירות</p>
                  </div>
                )}
              </div>
            </div>
            <div className="flex items-center gap-1 shrink-0">
              <input ref={importInputRef} type="file" accept="application/json" onChange={importJSON} className="hidden" />
              <button type="button" onClick={() => setShowConnect(true)} className="p-2 rounded-lg text-ice-100/70 hover:bg-white/[0.05]" title="התחבר לטלפון"><IconPhone size={18}/></button>
              <button type="button" onClick={() => importInputRef.current?.click()} className="p-2 rounded-lg text-ice-100/70 hover:bg-white/[0.05]" title="ייבוא JSON"><IconRefresh size={18}/></button>
              <button type="button" onClick={exportJSON} className="p-2 rounded-lg text-ice-100/70 hover:bg-white/[0.05]" title="ייצוא JSON"><IconDownload size={18}/></button>
            </div>
          </div>

          {/* Mode toggle (hidden when inside an apartment) */}
          {!selectedAptId && (
            <div className="mt-3 grid grid-cols-3 gap-1 p-1 bg-white/[0.04] border border-white/5 rounded-xl">
              {[
                { key: 'inspect',  label: 'בדיקה',    icon: <IconClipboard size={14}/> },
                { key: 'shopping', label: 'קניות',    icon: <IconCart size={14}/> },
                { key: 'setup',    label: 'הגדרות',   icon: <IconSettings size={14}/> },
              ].map(t => (
                <button key={t.key} type="button" onClick={() => switchMode(t.key)}
                  className={`flex items-center justify-center gap-1 py-2 rounded-lg text-xs sm:text-sm font-bold transition ${
                    mode === t.key ? 'bg-copper-500 text-white shadow-[0_4px_14px_-4px_rgba(200,127,62,0.7)]' : 'text-ice-100/60 hover:text-ice-50 hover:bg-white/[0.04]'
                  }`}>
                  {t.icon} {t.label}
                </button>
              ))}
            </div>
          )}

          {/* Breadcrumb when inside apt */}
          {selectedAptId && property && (
            <div className="mt-2 flex items-center gap-1.5 text-[11px] text-ice-100/50">
              <button type="button" onClick={() => { setSelectedAptId(null); setSelectedRoom(null); }}
                className="hover:text-ice-50 transition">דירות</button>
              <IconChevRight size={10}/>
              {currentRoom ? (
                <>
                  <button type="button" onClick={() => setSelectedRoom(null)}
                    className="hover:text-ice-50 transition truncate max-w-[140px]">{property.name}</button>
                  <IconChevRight size={10}/>
                  <span className={ROOM_ACCENT[currentRoom.accent].text}>{currentRoom.label}</span>
                </>
              ) : (
                <span className="text-ice-50/80">{property.name}</span>
              )}
            </div>
          )}
        </div>
      </header>

      {/* Body */}
      <main className="flex-1 max-w-2xl mx-auto w-full pb-safe relative z-10">
        {mode === 'inspect' && !selectedAptId && (
          <ApartmentGrid properties={properties} inspections={inspections}
            setInspection={setInspection} onSelect={setSelectedAptId} />
        )}
        {mode === 'inspect' && selectedAptId && !selectedRoom && property && (
          <ApartmentWorkspace property={property} inspection={inspection}
            onChange={handleInspectionChange} onOpenRoom={setSelectedRoom} />
        )}
        {mode === 'inspect' && selectedAptId && selectedRoom && property && (
          <div className="px-4 pb-10">
            <RoomScreen property={property} inspection={inspection} roomKey={selectedRoom}
              onChange={handleInspectionChange} />
          </div>
        )}
        {mode === 'shopping' && <ShoppingView properties={properties} inspections={inspections} />}
        {mode === 'setup'    && <SetupView    properties={properties} setProperties={setProperties} inspections={inspections} setInspections={setInspections} />}
      </main>

      <footer className="text-center text-[10px] text-ice-100/30 py-3 no-print">
        כל הנתונים נשמרים מקומית במכשיר · גרסה 2.0
      </footer>

      {showConnect && <ConnectModal onClose={() => setShowConnect(false)} />}
    </div>
  );
};

/* =========================================================
   18. MOUNT
   ========================================================= */

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
setTimeout(() => document.getElementById('boot')?.remove(), 250);
</script>
</body>
</html>
